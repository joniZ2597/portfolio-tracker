<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PT // PORTFOLIO TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ─── TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#05070a;--surface:#0a0d12;--card:#0d1018;--card2:#0f1219;
  --border:#161c26;--border2:#1e2635;--border3:#253040;
  --accent:#00b8d9;--green:#00a86b;--red:#d93545;--yellow:#d4920a;--purple:#7c5cbf;
  --muted:#3d5060;--muted2:#263040;--text:#b8ccd8;--text2:#6a8099;
  --mono:'IBM Plex Mono',monospace;--sans:'Inter','Heebo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;min-height:100vh}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 3px)}

/* ─── LAYOUT ─────────────────────────────────────────── */
.wrap{max-width:1400px;margin:0 auto;padding:12px 16px;position:relative;z-index:1}

/* ─── TOP BAR ────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:10px}
.brand{display:flex;align-items:center;gap:9px}
.brand-mark{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--accent);
  background:rgba(0,184,217,.08);border:1px solid rgba(0,184,217,.2);
  border-radius:2px;padding:3px 7px;letter-spacing:2px}
.brand-name{font-family:var(--mono);font-size:12px;letter-spacing:.5px}
.brand-sub{font-size:9px;color:var(--muted)}
.regime-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rpill{font-family:var(--mono);font-size:8px;font-weight:600;padding:2px 7px;
  border-radius:2px;border:1px solid;letter-spacing:.5px;white-space:nowrap}
.rpill.on {color:var(--green);border-color:rgba(0,168,107,.25);background:rgba(0,168,107,.07)}
.rpill.off{color:var(--red);border-color:rgba(217,53,69,.25);background:rgba(217,53,69,.07)}
.rpill.mix{color:var(--yellow);border-color:rgba(212,146,10,.25);background:rgba(212,146,10,.07)}
.rpill.inf{color:var(--muted);border-color:var(--border2);background:transparent}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ─── CONFIG ─────────────────────────────────────────── */
.config-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:9px}
.cfg-row{background:var(--card);border:1px solid var(--border);border-radius:2px;
  padding:6px 9px;display:flex;align-items:center;gap:6px}
.cfg-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;white-space:nowrap;min-width:50px}
.cfg-row input{background:transparent;border:none;outline:none;color:var(--text);
  font-family:var(--mono);font-size:9px;flex:1;min-width:0}
.cfg-row input::placeholder{color:var(--muted2)}
.btn-cfg{font-family:var(--mono);font-size:8px;color:var(--accent);background:none;
  border:1px solid rgba(0,184,217,.2);border-radius:2px;padding:2px 6px;cursor:pointer}
.btn-cfg:hover{background:rgba(0,184,217,.08)}
.cfg-st{font-family:var(--mono);font-size:8px;min-width:16px}

/* ─── WATCHLIST ──────────────────────────────────────── */
.wl-bar{background:var(--card);border:1px solid var(--border);border-radius:2px;
  padding:8px 11px;margin-bottom:9px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.wl-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.wl-inp{background:var(--bg);border:1px solid var(--border2);border-radius:2px;
  color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 8px;
  outline:none;width:88px;text-transform:uppercase}
.wl-inp:focus{border-color:var(--accent)}
.btn-add{font-family:var(--mono);font-size:9px;background:rgba(0,184,217,.1);
  border:1px solid rgba(0,184,217,.22);color:var(--accent);border-radius:2px;padding:3px 10px;cursor:pointer}
.btn-ghost{font-family:var(--mono);font-size:8px;background:none;border:1px solid var(--border2);
  color:var(--muted);border-radius:2px;padding:3px 8px;cursor:pointer}
.btn-ghost:hover{color:var(--text2)}
.chips-wrap{display:flex;flex-wrap:wrap;gap:3px;flex:1}
.chip{font-family:var(--mono);font-size:9px;background:var(--muted2);border-radius:2px;
  padding:2px 5px;display:flex;align-items:center;gap:3px}
.chip-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;line-height:1}
.chip-x:hover{color:var(--red)}

/* ─── RUN ────────────────────────────────────────────── */
.run-bar{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.btn-run{font-family:var(--mono);font-size:10px;font-weight:600;background:var(--accent);
  color:#000;border:none;border-radius:2px;padding:8px 20px;cursor:pointer;
  letter-spacing:1.5px;text-transform:uppercase}
.btn-run:hover{opacity:.88}
.btn-run:disabled{opacity:.3;cursor:not-allowed}
.prog-wrap{height:2px;background:var(--border);margin-bottom:9px;display:none}
.prog-bar{height:100%;background:var(--accent);width:0;transition:width .4s}
.error-box{display:none;font-family:var(--mono);font-size:9px;color:var(--red);
  background:rgba(217,53,69,.07);border:1px solid rgba(217,53,69,.18);
  border-radius:2px;padding:6px 9px;margin-bottom:9px}
.debug-panel{display:none!important}

/* ─── RESULTS HDR ────────────────────────────────────── */
.results-hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.res-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.res-date{font-family:var(--mono);font-size:9px;color:var(--accent)}
.btn-exp{font-family:var(--mono);font-size:8px;color:var(--muted);background:none;
  border:1px solid var(--border2);border-radius:2px;padding:3px 8px;cursor:pointer}

/* ─── GRID ───────────────────────────────────────────── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(540px,1fr));gap:8px}
@media(max-width:580px){.cards-grid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════════════
   RESEARCH CARD
═══════════════════════════════════════════════════════ */
.rcard{background:var(--card);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.rcard.positive{border-left:3px solid var(--green)}
.rcard.negative{border-left:3px solid var(--red)}
.rcard.neutral {border-left:3px solid var(--muted)}

/* ── CARD HEADER ─ */
.rcard-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:8px 11px 6px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.rcard-left{display:flex;align-items:baseline;gap:7px}
.ticker-sym{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.5px}
.ticker-name{font-size:10px;color:var(--muted)}
.rcard-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}

/* Sentiment badge */
.sent-badge{font-family:var(--mono);font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:2px;letter-spacing:.5px}
.sent-badge.positive{background:rgba(0,168,107,.1);color:var(--green);border:1px solid rgba(0,168,107,.22)}
.sent-badge.negative{background:rgba(217,53,69,.1);color:var(--red);border:1px solid rgba(217,53,69,.22)}
.sent-badge.neutral {background:var(--muted2);color:var(--text2);border:1px solid var(--border2)}

/* Trend phase badge */
.phase-badge{font-family:var(--mono);font-size:8px;font-weight:600;
  padding:2px 7px;border-radius:2px;letter-spacing:.5px;border:1px solid}
.phase-badge.accumulation {color:#5bc0eb;border-color:rgba(91,192,235,.3);background:rgba(91,192,235,.08)}
.phase-badge.continuation {color:var(--green);border-color:rgba(0,168,107,.3);background:rgba(0,168,107,.08)}
.phase-badge.base         {color:var(--yellow);border-color:rgba(212,146,10,.3);background:rgba(212,146,10,.08)}
.phase-badge.distribution {color:var(--red);border-color:rgba(217,53,69,.3);background:rgba(217,53,69,.08)}
.phase-badge.correction   {color:#e87040;border-color:rgba(232,112,64,.3);background:rgba(232,112,64,.08)}
.phase-badge.extended     {color:var(--purple);border-color:rgba(124,92,191,.3);background:rgba(124,92,191,.08)}

/* Setup quality */
.setup-badge{font-family:var(--mono);font-size:9px;font-weight:700;
  padding:2px 8px;border-radius:2px;letter-spacing:1px;border:1px solid}
.setup-badge.ap {color:#00e676;border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.08)} /* A+ */
.setup-badge.a  {color:var(--green);border-color:rgba(0,168,107,.3);background:rgba(0,168,107,.08)}
.setup-badge.b  {color:var(--yellow);border-color:rgba(212,146,10,.3);background:rgba(212,146,10,.08)}
.setup-badge.c  {color:#e87040;border-color:rgba(232,112,64,.3);background:rgba(232,112,64,.08)}
.setup-badge.avoid{color:var(--red);border-color:rgba(217,53,69,.3);background:rgba(217,53,69,.08)}

/* ── SCORE ROW ─ */
.score-row{padding:5px 11px 0;display:flex;align-items:center;gap:6px}
.score-track{flex:1;height:2px;background:var(--border2);border-radius:1px;overflow:hidden}
.score-fill{height:100%;border-radius:1px}
.score-fill.positive{background:var(--green)}
.score-fill.negative{background:var(--red)}
.score-fill.neutral {background:var(--muted)}
.score-n{font-family:var(--mono);font-size:9px;color:var(--muted);width:22px;text-align:left}

/* ── TECHNICAL CHECKLIST ─ */
.tech-panel{padding:7px 11px;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:1fr 1fr;gap:2px 16px}
.tech-row{display:flex;align-items:center;justify-content:space-between;gap:4px;min-height:18px}
.tech-label{font-family:var(--mono);font-size:9px;color:var(--text2)}
.tech-val{font-family:var(--mono);font-size:9px;font-weight:600}
.tech-val.pass{color:var(--green)}
.tech-val.fail{color:var(--red)}
.tech-val.warn{color:var(--yellow)}
.tech-val.na  {color:var(--muted)}
.tech-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tech-dot.pass{background:var(--green)}
.tech-dot.fail{background:var(--red)}
.tech-dot.warn{background:var(--yellow)}
.tech-dot.na  {background:var(--muted2)}

/* ── MARKET STRUCTURE BOX ─ */
.mkt-struct{padding:7px 11px;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.mkt-cell{display:flex;flex-direction:column;gap:1px}
.mkt-cell-lbl{font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.mkt-cell-val{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text)}
.mkt-cell-val.pos{color:var(--green)}
.mkt-cell-val.neg{color:var(--red)}
.mkt-cell-val.warn{color:var(--yellow)}

/* ── BULL/BEAR ─ */
.bb-row{padding:6px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.bb-lbl{font-family:var(--mono);font-size:8px;width:28px}
.bb-lbl.b{color:var(--green)}.bb-lbl.r{color:var(--red)}
.bb-track{flex:1;height:4px;background:var(--border2);border-radius:2px;position:relative;overflow:hidden}
.bb-bull{position:absolute;left:0;top:0;height:100%;background:var(--green);border-radius:2px}
.bb-bear{position:absolute;right:0;top:0;height:100%;background:var(--red);border-radius:2px}
.bb-n{font-family:var(--mono);font-size:8px;width:22px;text-align:right}
.bb-n.b{color:var(--green)}.bb-n.r{color:var(--red)}

/* ── CONFIDENCE ─ */
.conf-row{padding:5px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.conf-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);white-space:nowrap;width:60px}
.conf-track{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.conf-fill.hi{background:var(--green)}.conf-fill.md{background:var(--yellow)}.conf-fill.lo{background:var(--muted)}
.conf-badge{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;white-space:nowrap}
.conf-badge.hi{color:var(--green);border-color:rgba(0,168,107,.2);background:rgba(0,168,107,.07)}
.conf-badge.md{color:var(--yellow);border-color:rgba(212,146,10,.2);background:rgba(212,146,10,.07)}
.conf-badge.lo{color:var(--muted);border-color:var(--border2);background:transparent}

/* ── KEY EVENT ─ */
.kevent-row{padding:7px 11px;border-bottom:1px solid var(--border)}
.sect-lbl{font-family:var(--mono);font-size:7px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}
.kevent-text{font-size:11px;color:var(--text);font-weight:500;line-height:1.5}
.rootcause-text{font-size:11px;color:var(--text2);line-height:1.5;margin-top:3px}

/* ── ACTION ─ */
.action-row{padding:7px 11px;border-bottom:1px solid var(--border);
  background:rgba(0,184,217,.03);border-right:2px solid var(--accent)}
.action-lbl{font-family:var(--mono);font-size:7px;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}
.action-text{font-size:11px;color:var(--text);font-weight:500;line-height:1.5}

/* ── SIGNAL CHIPS ─ */
.chips-row{padding:6px 11px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:3px}
.schip{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:2px;
  border:1px solid;white-space:nowrap;max-width:190px;overflow:hidden;text-overflow:ellipsis}
.schip.crit{background:rgba(217,53,69,.06);border-color:rgba(217,53,69,.2);color:var(--red)}
.schip.norm{background:rgba(0,184,217,.04);border-color:rgba(0,184,217,.15);color:var(--accent)}
.schip.warn{background:rgba(212,146,10,.06);border-color:rgba(212,146,10,.2);color:var(--yellow)}
.schip.good{background:rgba(0,168,107,.06);border-color:rgba(0,168,107,.2);color:var(--green)}

/* ── DRIVERS ─ */
.drivers-row{padding:6px 11px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.drv{display:flex;gap:6px;align-items:flex-start}
.drv-lbl{font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;white-space:nowrap;padding-top:2px;min-width:52px}
.drv-txt{font-size:10px;color:var(--text2);line-height:1.4}

/* ── TIMELINE ─ */
.timeline-row{padding:6px 11px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;gap:6px}
.tl-lbl{font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;writing-mode:horizontal-tb}
.tl-items{display:flex;gap:4px;align-items:flex-end}
.tl-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.tl-date{font-family:var(--mono);font-size:7px;color:var(--muted)}
.tl-bar-wrap{height:24px;display:flex;align-items:flex-end}
.tl-bar{width:3px;border-radius:1px;min-height:3px}
.tl-bar.up{background:var(--green)}.tl-bar.dn{background:var(--red)}.tl-bar.fl{background:var(--muted2)}
.tl-pct{font-family:var(--mono);font-size:7px}
.tl-pct.up{color:var(--green)}.tl-pct.dn{color:var(--red)}.tl-pct.fl{color:var(--muted)}

/* ── FOOTER ─ */
.rcard-footer{padding:5px 11px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.3)}
.rating-pill{font-family:var(--mono);font-size:8px;font-weight:700;
  padding:2px 8px;border-radius:2px;letter-spacing:1px}
.rating-pill.buy {background:rgba(0,168,107,.1);color:var(--green)}
.rating-pill.sell{background:rgba(217,53,69,.1);color:var(--red)}
.rating-pill.hold{background:var(--muted2);color:var(--text2)}
.pt-lbl{font-family:var(--mono);font-size:8px;color:var(--muted)}
.src-tag{font-family:var(--mono);font-size:7px;color:var(--muted2)}

/* ── DEEP DIVE ─ */
.btn-dd{width:100%;padding:6px 11px;background:none;border:none;
  border-top:1px solid var(--border);color:var(--muted);
  font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:1px;
  cursor:pointer;text-align:right}
.btn-dd:hover{color:var(--accent);background:rgba(0,184,217,.03)}
.dd-result{display:none;padding:9px 11px;border-top:1px solid var(--border);background:rgba(0,0,0,.25)}
.dd-lbl{font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.dd-body{font-size:10px;color:var(--text2);line-height:1.6}

/* ── EMPTY ─ */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-family:var(--mono);font-size:22px;margin-bottom:12px;opacity:.3}
.empty-title{font-family:var(--mono);font-size:11px;margin-bottom:5px}
.empty-desc{font-size:10px;color:var(--muted2);line-height:1.6}

#progressLabel{font-family:var(--mono);font-size:9px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">PT</div>
      <div>
        <div class="brand-name">PORTFOLIO_TERMINAL</div>
        <div class="brand-sub">Institutional Decision Dashboard</div>
      </div>
    </div>
    <div class="regime-bar" id="regimeBar">
      <div class="live-dot"></div>
      <span class="rpill inf" id="lastUpdated">READY</span>
    </div>
  </div>

  <div class="config-strip">
    <div class="cfg-row">
      <span class="cfg-lbl">ANTHROPIC</span>
      <input type="password" id="apiKey" placeholder="sk-ant-..."/>
      <button class="btn-cfg" onclick="saveKey()">SAVE</button>
      <span class="cfg-st" id="keyStatus"></span>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl">PERPLEXITY</span>
      <input type="password" id="pplxKey" placeholder="pplx-..."/>
      <button class="btn-cfg" onclick="savePplxKey()">SAVE</button>
      <span class="cfg-st" id="pplxKeyStatus"></span>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl">ALPHA VAL</span>
      <input type="password" id="avKey" placeholder="AV key..."/>
      <button class="btn-cfg" onclick="saveAvKey()">SAVE</button>
      <span class="cfg-st" id="avKeyStatus"></span>
    </div>
  </div>

  <div class="wl-bar">
    <span class="wl-lbl">WATCHLIST</span>
    <div style="display:flex;align-items:center;gap:5px">
      <input class="wl-inp" type="text" id="tickerInput" placeholder="AAPL" maxlength="10"
        onkeydown="if(event.key==='Enter') addTicker()"/>
      <button class="btn-add" onclick="addTicker()">+ ADD</button>
      <button class="btn-ghost" onclick="loadSample()">↺ Portfolio</button>
      <button class="btn-ghost" onclick="clearAll()">Clear</button>
    </div>
    <div class="chips-wrap" id="tickerChips"></div>
  </div>

  <div class="run-bar">
    <button class="btn-run" id="runBtn" onclick="runAnalysis()">RUN ANALYSIS</button>
    <span id="progressLabel"></span>
  </div>

  <div class="debug-panel" id="debugPanel"><div id="debugContent"></div></div>
  <div class="error-box" id="errorBox"></div>
  <div class="prog-wrap" id="progressWrap"><div class="prog-bar" id="progressBar"></div></div>

  <div id="resultsSection" style="display:none">
    <div class="results-hdr">
      <div style="display:flex;align-items:center;gap:9px">
        <span class="res-label">RESEARCH OUTPUT</span>
        <span class="res-date" id="resultsDate"></span>
      </div>
      <button class="btn-exp" onclick="exportJSON()">EXPORT JSON</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">[ ]</div>

// Validate a stock data object → returns true if all required fields present
function isValidStockData(d) {

    typeof d.low === 'number' &&

// Fetch from Yahoo Finance via proxy
async function fetchYahoo(symbol) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  const proxied = YAHOO_PROXY + encodeURIComponent(url);
  const res = await fetch(proxied, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('Yahoo HTTP ' + res.status);
  const json = await res.json();
  const meta = json?.chart?.result?.[0]?.meta;
  if (!meta) throw new Error('Yahoo: no meta for ' + symbol);
  return {
    symbol:         symbol,
    price:          parseFloat(meta.regularMarketPrice),
    change_percent: meta.previousClose ? parseFloat(((meta.regularMarketPrice - meta.previousClose) / meta.previousClose * 100).toFixed(2)) : 0,
    high:           parseFloat(meta.regularMarketDayHigh),
    low:            parseFloat(meta.regularMarketDayLow),
    open:           parseFloat(meta.regularMarketOpen),
    previous_close: parseFloat(meta.previousClose),
    volume:         parseInt(meta.regularMarketVolume),
    timestamp:      new Date(meta.regularMarketTime * 1000).toISOString(),
    source:         'yahoo'
  };
}

// Fetch from Alpha Vantage using TIME_SERIES_INTRADAY (real intraday high/low)
async function fetchAlphaVantage(symbol) {
  if (!avKey) throw new Error('Alpha Vantage key missing');

  // Step 1: get previous close via GLOBAL_QUOTE
  const gqUrl = `${AV_BASE}?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${avKey}`;
  const gqRes = await fetch(gqUrl, { signal: AbortSignal.timeout(8000) });
  if (!gqRes.ok) throw new Error('AV GQ HTTP ' + gqRes.status);
  const gqJson = await gqRes.json();
  const q = gqJson?.['Global Quote'];
  if (!q || !q['05. price']) throw new Error('AV: no data for ' + symbol);

  const price          = parseFloat(q['05. price']);
  const previous_close = parseFloat(q['08. previous close']);
  const change_percent = parseFloat(q['10. change percent'].replace('%', ''));
  const open           = parseFloat(q['02. open']);
  const volume         = parseInt(q['06. volume']);

  // Step 2: get real intraday high/low from TIME_SERIES_INTRADAY (15min)
  let high = parseFloat(q['03. high']);
  let low  = parseFloat(q['04. low']);
  try {
    const tsUrl = `${AV_BASE}?function=TIME_SERIES_INTRADAY&symbol=${symbol}&interval=15min&outputsize=compact&apikey=${avKey}`;
    const tsRes = await fetch(tsUrl, { signal: AbortSignal.timeout(8000) });
    if (tsRes.ok) {
      const tsJson = await tsRes.json();
      const series = tsJson?.['Time Series (15min)'];
      if (series) {
        const candles = Object.values(series);
        // Calculate true intraday high/low from all 15min candles today
        const highs = candles.map(c => parseFloat(c['2. high'])).filter(v => !isNaN(v));
        const lows  = candles.map(c => parseFloat(c['3. low'])).filter(v => !isNaN(v));
        if (highs.length) high = Math.max(...highs);
        if (lows.length)  low  = Math.min(...lows);
      }
    }
  } catch(e) {
    // Keep GLOBAL_QUOTE high/low as fallback → already set above
    console.warn('AV intraday fallback for ' + symbol + ':', e.message);
  }

  return {
    symbol, price, change_percent, high, low,
    open, previous_close, volume,
    timestamp: new Date().toISOString(),
    source: 'alphavantage'
  };
}

    } catch(e2) {
      console.warn(`Alpha Vantage failed for ${symbol}: ${e2.message}`);

    }
  }
}

// ── Parse Perplexity markdown/text into structured object ───────────────────
function parsePerplexityContext(raw) {
  const result = {};
  if (!raw || raw.length < 10) return result;
  const lines = raw.split('\n');
  let currentTicker = null, currentLines = [];

  const flushTicker = () => {
    if (!currentTicker || !currentLines.length) return;
    const block = currentLines.join('\n');
    const analystActions = [];
    const ptRe = /\b(Goldman|GS|Morgan Stanley|MS|JPMorgan|JPM|UBS|BofA|Bank of America|CFRA|Citi|Barclays|Jefferies|Wedbush|Needham|KeyBanc|Wells Fargo|Deutsche|Raymond James|Piper Sandler)[^\n]*?\$([0-9,]+)/gi;
    let ptMatch;
    while ((ptMatch = ptRe.exec(block)) !== null) {
      const target = parseFloat(ptMatch[2].replace(',', ''));
      if (target > 0 && target < 5000) analystActions.push({ bank: ptMatch[1], target, raw: ptMatch[0].slice(0, 80) });
    }
    const bullish = [], bearish = [];
    currentLines.forEach(l => {
      const ll = l.toLowerCase();
      if (ll.includes('bullish') || ll.includes('beat') || ll.includes('strong demand') || ll.includes('ai demand') || ll.includes('hbm') || ll.includes('upside')) {
        const clean = l.replace(/^[-*•#>\s]+/, '').trim();
        if (clean.length > 10) bullish.push(clean.slice(0, 100));
      }
      if (ll.includes('bearish') || ll.includes('risk') || ll.includes('pressure') || ll.includes('declining') || ll.includes('downside')) {
        const clean = l.replace(/^[-*•#>\s]+/, '').trim();
        if (clean.length > 10) bearish.push(clean.slice(0, 100));
      }
    });
    // Extract revision direction
    const revLine = currentLines.find(l => l.startsWith('REVISION_DIRECTION:'));
    const revDir = revLine ? revLine.replace('REVISION_DIRECTION:', '').trim() : 'unknown';
    const recLine = currentLines.find(l => l.startsWith('REVISION_RECENCY:'));
    const revRecency = recLine ? recLine.replace('REVISION_RECENCY:', '').trim() : 'unknown';
    const freshLine = currentLines.find(l => l.startsWith('DATA_FRESHNESS:'));
    const dataFreshness = freshLine ? freshLine.replace('DATA_FRESHNESS:', '').trim() : 'unknown';
    const earnLine = currentLines.find(l => l.startsWith('EARNINGS:'));
    const earnings = earnLine ? earnLine.replace('EARNINGS:', '').trim() : 'NONE';

    result[currentTicker] = {
      analystActions: analystActions.slice(0, 5),
      bullishCatalysts: bullish.slice(0, 4),
      bearishCatalysts: bearish.slice(0, 4),
      macroDrivers: [], institutionalFlows: [], risks: bearish.slice(0, 3),
      revisionDirection: revDir,
      revisionRecency: revRecency,
      dataFreshness,
      earnings
    };
    console.log(`[PT] Parsed ${currentTicker}: ${analystActions.length} analyst actions, ${bullish.length} bullish`);
    if (analystActions.length) console.log('[PT] Analyst actions:', JSON.stringify(analystActions));
  };

  for (const line of lines) {
    const tickerMatch = line.match(/^(?:TICKER:|##|\*\*)\s*([A-Z]{1,6})(?:\b|\*\*)/);
    if (tickerMatch) { flushTicker(); currentTicker = tickerMatch[1]; currentLines = []; }
    else if (currentTicker) currentLines.push(line);
  }
  flushTicker();

  if (Object.keys(result).length === 0 && raw.length > 50) {
    console.warn('[PT] No ticker headers found, using full text as context');
    result['__raw__'] = { rawText: raw, analystActions: [], bullishCatalysts: [], bearishCatalysts: [], macroDrivers: [], risks: [] };
    const ptRe2 = /\b(Goldman|GS|Morgan Stanley|UBS|BofA|CFRA|Citi|Barclays|Jefferies|Wedbush)[^\n]*?\$([0-9,]+)/gi;
    let m2;
    while ((m2 = ptRe2.exec(raw)) !== null) {
      const t = parseFloat(m2[2].replace(',', ''));
      if (t > 0 && t < 5000) result['__raw__'].analystActions.push({ bank: m2[1], target: t, raw: m2[0].slice(0, 80) });
    }
  }
  return result;
}

function formatNewsContext(pplxData, symbol) {

    const freshTag = d.dataFreshness && d.dataFreshness !== 'unknown' ? ` [data: ${d.dataFreshness}]` : '';
    lines.push('ANALYST ACTIONS: ' + ptStr + freshTag);
  } else {
    lines.push('ANALYST ACTIONS: No verified analyst PTs in current data');
  }
  // Revision direction — critical for weighting
  if (d.revisionDirection && d.revisionDirection !== 'unknown' && d.revisionDirection !== 'NONE') {
    lines.push('REVISION DIRECTION: ' + d.revisionDirection + (d.revisionRecency !== 'unknown' ? ' (most recent: ' + d.revisionRecency + ')' : ''));
  }
  if (d.earnings && d.earnings !== 'NONE') lines.push('EARNINGS: ' + d.earnings);
  if (d.bullishCatalysts?.length) lines.push('BULLISH: ' + d.bullishCatalysts.join(' | '));
  if (d.bearishCatalysts?.length) lines.push('BEARISH: ' + d.bearishCatalysts.join(' | '));
  if (d.macroDrivers?.length)     lines.push('MACRO: ' + d.macroDrivers.join(' | '));
  if (d.risks?.length)            lines.push('RISKS: ' + d.risks.join(' | '));
  if (d.rawText)                  lines.push('RAW CONTEXT: ' + d.rawText.slice(0, 400));
  return lines.length ? lines.join('\n') : `No specific catalysts found for ${symbol}.`;
}

const _fetchTimestamps = {};
function isStale(symbol, maxAgeMs = 5 * 60 * 1000) {
  const ts = _fetchTimestamps[symbol];
  if (!ts) return false;
  const age = Date.now() - ts;

}

// ── JSON repair ──────────────────────────────────────────────────────────────
function repairJSON(str) {
  str = str.replace(/,\s*([\]}])/g, '$1');
  let opens = 0, inStr = false, escape = false;
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (escape) { escape = false; continue; }
    if (c === '\\' && inStr) { escape = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{' || c === '[') opens++;
    if (c === '}' || c === ']') opens--;
  }
  const lastComplete = str.lastIndexOf('}]');
  if (opens > 0 && lastComplete > 0) str = str.slice(0, lastComplete + 2) + '}';
  return str;
}

function parseJSON(raw) {
  let clean = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const start = clean.indexOf('{');
  const end   = clean.lastIndexOf('}');
  if (start === -1) { console.warn('[PT] parseJSON: no { found'); return { results: [] }; }
  let jsonStr = end > start ? clean.slice(start, end + 1) : clean.slice(start);
  try { return JSON.parse(jsonStr); } catch(e1) {}
  try { return JSON.parse(repairJSON(jsonStr)); } catch(e2) {}
  console.warn('[PT] parseJSON: falling back to per-ticker extraction');
  const items = [];
  const tickerRe = /\{[^{}]*"ticker"\s*:\s*"([^"]+)"[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/g;
  let m;
  while ((m = tickerRe.exec(jsonStr)) !== null) {
    try { const obj = JSON.parse(m[0].replace(/,\s*$/, '')); if (obj.ticker) items.push(obj); } catch(e3) {}
  }
  console.log('[PT] parseJSON: extracted', items.length, 'items via fallback');
  return { results: items };
}

STRUCTURED RESEARCH (extracted facts — use for drivers):
${researchByTicker}

OUTPUT — raw JSON only, no fences:
{"results":[{"ticker":"X","company_name":"Full Name","sentiment":"positive/negative/neutral","sentiment_score":0-100,"summary":"[Key Event]...[Root Cause]...[Price Context]...[Bull vs Bear]...[Actionable Take]...Rating: Buy/Neutral/Sell | PT: $X | Do not chase strength","alerts":[{"type":"critical/normal","text":"specific alert"}],"news":["Primary: [driver]","Secondary: [driver]","Background: [context]"]}]}

Tickers: ${batch.join(',')}`;

  console.log('[PT] Anthropic user prompt length:', user.length);

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 3000, system: system, messages: [{ role: 'user', content: user }, { role: 'assistant', content: '{' }] })
  });
  if (!response.ok) { const err = await response.json(); throw new Error('Anthropic: ' + (err.error?.message || 'API error')); }
  const data = await response.json();
  let textContent = '';
  for (const block of data.content) { if (block.type === 'text') textContent += block.text; }

  let fullResponse = textContent.trim();
  if (fullResponse.startsWith('"ticker"') || fullResponse.startsWith('"results"')) {
    fullResponse = '{' + fullResponse;
    if (fullResponse.includes('"ticker"') && !fullResponse.includes('"results"')) fullResponse = '{"results":[' + fullResponse + ']}';
  } else if (fullResponse.startsWith('{')) {
    if (fullResponse.includes('"ticker"') && !fullResponse.includes('"results"')) fullResponse = '{"results":[' + fullResponse + ']}';
  } else if (fullResponse.startsWith('[')) {
    fullResponse = '{"results":' + fullResponse + '}';
  } else {
    fullResponse = '{"results":[{' + fullResponse + ']}';
  }
  console.log('[PT] Anthropic response OK, length:', fullResponse.length);
  console.log('[PT] Response first chars:', fullResponse.slice(0, 60));
  return fullResponse;
}

// ── Perplexity-only analysis ─────────────────────────────────────────────────
async function fetchPerplexityAnalysis(batch, today, stockContext = '') {
  const prompt = `You are a high-conviction hedge fund analyst. Decisive. Data-driven.
${stockContext ? 'VERIFIED PRICE DATA (use ONLY these numbers):\n' + stockContext + '\n' : ''}
For each ticker: ${batch.join(',')} write one institutional paragraph.
Structure: Key Event → Root Cause → Price Context → Bull vs Bear → Actionable Take
End: "Rating: Buy/Neutral/Sell | PT: $X | Do not chase strength"
Output STRICT JSON only — no backticks:
{"results":[{"ticker":"X","company_name":"Name","sentiment":"positive/negative/neutral","sentiment_score":0-100,"summary":"paragraph","alerts":[{"type":"critical/normal","text":"text"}],"news":["catalyst 1","catalyst 2"]}]}`;

  const response = await fetch('https://api.perplexity.ai/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${pplxKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'sonar-pro', messages: [{ role: 'user', content: prompt }], max_tokens: 1500 })
  });
  if (!response.ok) { const err = await response.json(); throw new Error('Perplexity: ' + (err.error?.message || 'API error')); }
  const data = await response.json();
  return data.choices[0].message.content.trim();
}

// ── Orchestration layer ──────────────────────────────────────────────────────
function orchestrate(claudeResults, pplxData, stockData) {
  return claudeResults.map(item => {
    const sym = item.ticker;
    const mkt  = stockData?.[sym];
    const pplx = pplxData?.[sym] || pplxData?.['__raw__'];

    if (mkt) { item._verifiedPrice = mkt.price; item._verifiedChangePct = mkt.change_percent; item._dataSource = mkt.source; }

    if (pplx?.analystActions?.length) {
      const ptMentioned = pplx.analystActions.some(a => item.summary?.includes(a.bank) || item.summary?.includes('$' + a.target));
      if (!ptMentioned) {
        item.alerts = item.alerts || [];
        pplx.analystActions.forEach(a => {
          item.alerts.push({ type: 'critical', text: `${a.bank} price target $${a.target} — verify if recent` });
        });
      }
    }

    if (item.alerts?.length) {
      const seen = new Set();
      item.alerts = item.alerts.filter(a => { const key = (a.text||'').slice(0,50); if (seen.has(key)) return false; seen.add(key); return true; });
    }

    const chg = mkt?.change_percent ?? 0;
    if (chg < -5 && item.sentiment_score > 60) { console.warn(`[PT] Orchestrate: score override ${sym} down ${chg}%`); item.sentiment_score = Math.min(item.sentiment_score, 45); item.sentiment = 'negative'; }
    if (chg > 5  && item.sentiment_score < 40) { console.warn(`[PT] Orchestrate: score override ${sym} up ${chg}%`);   item.sentiment_score = Math.max(item.sentiment_score, 55); item.sentiment = 'positive'; }

    item._orchestrated = true;
    item._orchestratedAt = new Date().toISOString();
    return item;
  });
}

// ── Score consistency enforcement ────────────────────────────────────────────
function enforceScoreConsistency(results, newsContext) {
  const tierOneBullish = ['raised pt', 'raised price target', 'pt hike', 'upgrade', 'earnings beat', 'revenue beat', 'buy rating initiated'];
  const tierOneBearish = ['downgrade', 'cut pt', 'sell rating', 'missed earnings', 'guidance cut'];
  const ctxLower = (newsContext || '').toLowerCase();
  const bullishCount = tierOneBullish.filter(s => ctxLower.includes(s)).length;
  const bearishCount = tierOneBearish.filter(s => ctxLower.includes(s)).length;

  return results.map(item => {
    const score = item.sentiment_score || 50;
    const chgPct = item._changePct || 0;
    if (typeof chgPct === 'number' && chgPct < -3) { console.log(`[PT] enforceScore: skipping boost for ${item.ticker} (down day ${chgPct}%)`); return item; }
    if (bullishCount >= 2 && bearishCount === 0 && score < 65) { console.warn(`[PT-SCORE] ${item.ticker}: Tier1 boost ${score} → 72`); return { ...item, sentiment: 'positive', sentiment_score: 72 }; }
    return item;
  });
}

// ── analyzeChunk ─────────────────────────────────────────────────────────────
async function analyzeChunk(batch, today) {
  // Enforce single-ticker mode — split multi-ticker into sequential single runs
  if (batch.length > 1) {
    console.log(`[PT] Multi-ticker batch: running sequentially for isolation`);
    const allResults = [];
    for (const sym of batch) {
      const r = await analyzeChunk([sym], today);
      allResults.push(...r);
    }
    return allResults;
  }
  console.log(`[PT] analyzeChunk START: ${batch[0]}`);
  let rawText = '', pplxData = {}, stockData = {};

  stockData = await fetchBatchStockData(batch);
  batch.forEach(sym => { _fetchTimestamps[sym] = Date.now(); });
  batch.forEach(sym => {
    const d = stockData[sym];
    if (d) console.log(`[PT] Market OK: ${sym} $${d.price} ${d.change_percent}% [${d.source}]`);
    else   console.warn(`[PT] Market MISS: ${sym}`);
  });
  const stockContext = formatStockContext(stockData);

  if (apiKey && pplxKey) {
    // Per-ticker isolation: call Perplexity once per ticker, never batch
    for (const sym of batch) {
      try {
        const raw = await fetchPerplexityContext([sym]); // single ticker only
        const parsed = parsePerplexityContext(raw);
        // Merge into pplxData — only under the correct ticker key
        if (parsed[sym]) {
          pplxData[sym] = parsed[sym];
          console.log(`[PT] Perplexity OK for ${sym}: ${parsed[sym].analystActions?.length || 0} analyst actions`);
        } else if (parsed['__raw__']) {
          // Fallback: tag raw context under the correct ticker
          pplxData[sym] = { ...parsed['__raw__'], _ticker: sym };
          console.log(`[PT] Perplexity raw fallback for ${sym}`);
        }
      } catch(e) { console.warn(`[PT] Perplexity failed for ${sym}:`, e.message); }
    }
    console.log(`[PT] Perplexity parsed tickers: ${Object.keys(pplxData).join(',') || 'none'}`);

    // Debug: console only — never expose to UI
    console.log('[PT] stockContext length:', stockContext.length);
    console.log('[PT] pplxData keys:', Object.keys(pplxData).join(','));

    rawText = await fetchAnthropicAnalysis(batch, today, stockContext + '\n%%NEWS_CONTEXT_START%%\n' + JSON.stringify(pplxData));
  } else if (apiKey) {
    rawText = await fetchAnthropicAnalysis(batch, today, stockContext);
  } else if (pplxKey) {
    rawText = await fetchPerplexityAnalysis(batch, today, stockContext);
  }

  console.log('[PT] Claude raw response length:', rawText.length);
  const parsed = parseJSON(rawText);
  const raw = parsed.results || [];

  const orchestrated = orchestrate(raw, pplxData, stockData);

  window._lastRunState = { stockData, pplxData, runId: Date.now(), timestamp: new Date().toISOString() };

  const resultsWithPct = orchestrated.map(item => {
    const mkt = stockData[item.ticker];
    return mkt ? { ...item, _changePct: mkt.change_percent } : item;
  });
  return enforceScoreConsistency(resultsWithPct, pplxKey ? JSON.stringify(pplxData) : '');
}

// ── renderResults ────────────────────────────────────────────────────────────
function renderResults(allResults, dateStr) {
  const grid = document.getElementById('cardsGrid');
  const section = document.getElementById('resultsSection');
  const dateEl = document.getElementById('resultsDate');
  if (!grid) { console.warn('[PT] cardsGrid not found'); return; }
  if (dateEl) dateEl.textContent = dateStr;
  if (section) section.style.display = 'block';
  const es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';

  // Regime bar
  const rb = document.getElementById('regimeBar');
  if (rb) {
    const avg = allResults.length ? Math.round(allResults.reduce((s,r)=>s+(r.sentiment_score||50),0)/allResults.length) : 50;
    const [rLabel,rCls] = avg>=65?['RISK-ON','on']:avg<=40?['RISK-OFF','off']:['MIXED','mix'];
    rb.innerHTML = `<div class="live-dot"></div>
      <span class="rpill ${rCls}">${rLabel}</span>
      <span class="rpill inf">SCORE AVG: ${avg}</span>
      <span class="rpill inf">${dateStr}</span>`;
  }

  grid.innerHTML = allResults.map(item => {
    const score = item.sentiment_score || 50;
    const sent  = item.sentiment==='positive'?'positive':item.sentiment==='negative'?'negative':'neutral';
    const sLbl  = sent==='positive'?'▲ BULLISH':sent==='negative'?'▼ BEARISH':'● NEUTRAL';
    const chg   = typeof item._verifiedChangePct==='number' ? item._verifiedChangePct : null;

    // Parse summary sections
    const sum = item.summary || '';
    const getS = tag => {
      const m = sum.match(new RegExp(tag+':?\\s*(.+?)(?=KEY EVENT:|ROOT CAUSE:|PRICE CONTEXT:|BULL VS BEAR:|ACTIONABLE TAKE:|Rating:|$)','si'));
      return m ? m[1].trim().replace(/\n/g,' ').replace(/\s+/g,' ') : '';
    };
    const keyEvent   = getS('KEY EVENT');
    const rootCause  = getS('ROOT CAUSE');
    const priceCtx   = getS('PRICE CONTEXT');
    const actionable = getS('ACTIONABLE TAKE');

    // Rating / PT
    const rM = sum.match(/Rating:\s*(Buy|Neutral|Sell)/i);
    const pM = sum.match(/PT:\s*\$?([\d,.]+|consensus unavailable)/i);
    const rating   = rM ? rM[1] : 'Neutral';
    const pt       = pM ? pM[1] : 'N/A';
    const ratingCls= rating.toLowerCase()==='buy'?'buy':rating.toLowerCase()==='sell'?'sell':'hold';

    // ── TREND PHASE from summary text ─────────────────
    const sumLower = sum.toLowerCase();
    let phase='', phaseCls='';
    if(sumLower.includes('accumulation')){phase='ACCUMULATION';phaseCls='accumulation'}
    else if(sumLower.includes('continuation')||sumLower.includes('momentum cont')){phase='CONTINUATION';phaseCls='continuation'}
    else if(sumLower.includes('base formation')||sumLower.includes('basing')){phase='BASE';phaseCls='base'}
    else if(sumLower.includes('distribution')){phase='DISTRIBUTION';phaseCls='distribution'}
    else if(sumLower.includes('correction')||sumLower.includes('pullback')||sumLower.includes('profit-taking')){phase='CORRECTION';phaseCls='correction'}
    else if(sumLower.includes('extended')||sumLower.includes('overextended')){phase='EXTENDED';phaseCls='extended'}
    else if(chg!==null&&chg<-3){phase='CORRECTION';phaseCls='correction'}
    else if(chg!==null&&chg>3){phase='CONTINUATION';phaseCls='continuation'}
    else{phase='NEUTRAL';phaseCls='base'}

    // ── SETUP QUALITY from score + alerts ────────────
    const alertCount = (item.alerts||[]).length;
    const hasCrit = (item.alerts||[]).some(a=>a.type==='critical');
    let setupGrade='', setupCls='';
    if(score>=78&&!hasCrit){setupGrade='A+';setupCls='ap'}
    else if(score>=68&&!hasCrit){setupGrade='A';setupCls='a'}
    else if(score>=55){setupGrade='B';setupCls='b'}
    else if(score>=42){setupGrade='C';setupCls='c'}
    else{setupGrade='AVOID';setupCls='avoid'}

    // ── TECHNICAL CHECKLIST ───────────────────────────
    // Derive from price change, score, and summary keywords
    const above50  = chg!==null?(chg>-8?'pass':'fail'):'na';
    const above150 = score>=55?'pass':score>=42?'warn':'fail';
    const above200 = score>=60?'pass':score>=45?'warn':'fail';
    const volAbove = sumLower.includes('elevated volume')||sumLower.includes('high volume')?'pass':
                     sumLower.includes('volume')?'warn':'na';
    const overext  = sumLower.includes('overextended')||sumLower.includes('extended')?'fail':
                     score>=78?'warn':'pass';
    const volatility = (chg!==null&&Math.abs(chg)>4)?'warn':'pass';
    const relStrength = score>=65?'pass':score>=48?'warn':'fail';
    const earnings = sumLower.includes('earnings')||sumLower.includes('q1')||sumLower.includes('q2')||sumLower.includes('q3')||sumLower.includes('q4')?'warn':'na';

    const chkRow = (lbl,st,val='') => {
      const vt = val || (st==='pass'?'YES':st==='fail'?'NO':st==='warn'?'WATCH':'N/A');
      return `<div class="tech-row">
        <span class="tech-label">${lbl}</span>
        <div style="display:flex;align-items:center;gap:3px">
          <div class="tech-dot ${st}"></div>
          <span class="tech-val ${st}">${vt}</span>
        </div>
      </div>`;
    };

    const techHTML = `
      ${chkRow('Above 50DMA',above50)}
      ${chkRow('Above 150DMA',above150)}
      ${chkRow('Above 200DMA',above200)}
      ${chkRow('Rel Strength',relStrength)}
      ${chkRow('Volume',volAbove)}
      ${chkRow('Overextended',overext==='-'?'na':overext)}
      ${chkRow('Volatility',volatility)}
      ${chkRow('Earnings Prox',earnings)}`;

    // ── MARKET STRUCTURE BOX ──────────────────────────
    const chgStr  = chg!==null?`${chg>0?'+':''}${chg.toFixed(1)}%`:'N/A';
    const chgCls  = chg===null?'':chg>0?'pos':chg<0?'neg':'';
    const volReg  = Math.abs(chg||0)>4?'HIGH':Math.abs(chg||0)>2?'MED':'LOW';
    const volRegCls = volReg==='HIGH'?'warn':volReg==='MED'?'':''
    const srProx  = sumLower.includes('support')?'NEAR SUP':sumLower.includes('resistance')?'NEAR RES':'RANGE';

    // ── CONFIDENCE ────────────────────────────────────
    const confPct = score>=72?88:score>=58?62:score>=45?38:22;
    const confCls = confPct>=70?'hi':confPct>=45?'md':'lo';
    const confLbl = confPct>=70?'HIGH':confPct>=45?'MIXED':'LOW';

    // ── SIGNAL CHIPS ──────────────────────────────────
    const alerts = [...new Map((item.alerts||[]).filter(a=>a&&a.text).map(a=>[a.text.slice(0,36),a])).values()].slice(0,3);
    const alertChips = alerts.map(a=>{
      const t=a.text.slice(0,44)+(a.text.length>44?'…':'');
      return `<span class="schip ${a.type==='critical'?'crit':'norm'}">${t}</span>`;
    }).join('');

    // Auto chips from summary content
    const autoChips = [
      sumLower.includes('hbm')?'<span class="schip good">HBM DEMAND</span>':'',
      sumLower.includes('ai demand')||sumLower.includes('ai-driven')?'<span class="schip good">AI DEMAND</span>':'',
      sumLower.includes('sector rotation')?'<span class="schip warn">SECTOR ROTATION</span>':'',
      sumLower.includes('elevated volume')?'<span class="schip norm">HIGH VOLUME</span>':'',
      sumLower.includes('no verified')||sumLower.includes('limited catalyst')?'<span class="schip warn">NO CATALYST</span>':'',
      sumLower.includes('profit-taking')?'<span class="schip warn">PROFIT TAKING</span>':'',
      sumLower.includes('upgrade')?'<span class="schip good">UPGRADE</span>':'',
      sumLower.includes('downgrade')?'<span class="schip crit">DOWNGRADE</span>':'',
    ].filter(Boolean).slice(0,4).join('');

    // ── DRIVERS ───────────────────────────────────────
    const news = item.news||[];
    const pri  = news.find(n=>n.startsWith('Primary'))||'';
    const sec  = news.find(n=>n.startsWith('Secondary'))||'';
    const bg   = news.find(n=>n.startsWith('Background'))||'';
    const drv  = (l,t) => t?`<div class="drv"><span class="drv-lbl">${l}</span><span class="drv-txt">${t.replace(/^(Primary|Secondary|Background):\s*/i,'')}</span></div>`:'';

    // ── MINI TIMELINE ─────────────────────────────────
    let tlHTML = '';
    if (chg !== null) {
      const today = new Date();
      const fmtDate = d => { const dt=new Date(today); dt.setDate(dt.getDate()+d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
      const days = [-3,-2,-1,0];
      const todayH = Math.min(24, Math.max(3, Math.abs(chg)*3));
      const bars = days.map((d,i) => {
        if(i===3) {
          const cls=chg>0?'up':chg<0?'dn':'fl';
          return `<div class="tl-item">
            <div class="tl-date">${fmtDate(d)}</div>
            <div class="tl-bar-wrap"><div class="tl-bar ${cls}" style="height:${todayH}px"></div></div>
            <div class="tl-pct ${cls}">${chg>0?'+':''}${chg.toFixed(1)}%</div>
          </div>`;
        }
        return `<div class="tl-item">
          <div class="tl-date">${fmtDate(d)}</div>
          <div class="tl-bar-wrap"><div class="tl-bar fl" style="height:4px"></div></div>
          <div class="tl-pct fl">—</div>
        </div>`;
      }).join('');
      tlHTML = `<div class="timeline-row">
        <span class="tl-lbl">SESSIONS</span>
        <div class="tl-items">${bars}</div>
      </div>`;
    }

    const fallback = !keyEvent?`<div class="kevent-row"><div class="kevent-text">${sum.replace(/Rating:.*$/s,'').trim().slice(0,280)}</div></div>`:'';

    return `<div class="rcard ${sent}">
      <div class="rcard-hdr">
        <div class="rcard-left">
          <span class="ticker-sym">${item.ticker}</span>
          <span class="ticker-name">${item.company_name||''}</span>
        </div>
        <div class="rcard-right">
          <span class="sent-badge ${sent}">${sLbl}</span>
          ${phase?`<span class="phase-badge ${phaseCls}">${phase}</span>`:''}
          <span class="setup-badge ${setupCls}">SETUP ${setupGrade}</span>
        </div>
      </div>
      <div class="score-row">
        <div class="score-track"><div class="score-fill ${sent}" style="width:${score}%"></div></div>
        <span class="score-n">${score}</span>
      </div>

      <div class="tech-panel">${techHTML}</div>

      <div class="mkt-struct">
        <div class="mkt-cell">
          <span class="mkt-cell-lbl">DAY CHG</span>
          <span class="mkt-cell-val ${chgCls}">${chgStr}</span>
        </div>
        <div class="mkt-cell">
          <span class="mkt-cell-lbl">VOL REGIME</span>
          <span class="mkt-cell-val ${volRegCls}">${volReg}</span>
        </div>
        <div class="mkt-cell">
          <span class="mkt-cell-lbl">S/R PROX</span>
          <span class="mkt-cell-val">${srProx}</span>
        </div>
      </div>

      ${tlHTML}

      <div class="bb-row">
        <span class="bb-lbl b">BULL</span>
        <div class="bb-track">
          <div class="bb-bull" style="width:${score}%"></div>
          <div class="bb-bear" style="width:${100-score}%"></div>
        </div>
        <span class="bb-n b">${score}</span>
        <span class="bb-n r">${100-score}</span>
      </div>
      <div class="conf-row">
        <span class="conf-lbl">CONFIDENCE</span>
        <div class="conf-track"><div class="conf-fill ${confCls}" style="width:${confPct}%"></div></div>
        <span class="conf-badge ${confCls}">${confLbl} · ${confPct}%</span>
      </div>

      ${keyEvent?`<div class="kevent-row">
        <div class="sect-lbl">KEY EVENT</div>
        <div class="kevent-text">${keyEvent}</div>
        ${rootCause?`<div class="rootcause-text">${rootCause}</div>`:''}
      </div>`:fallback}

      ${actionable?`<div class="action-row">
        <div class="action-lbl">ACTIONABLE TAKE</div>
        <div class="action-text">${actionable.replace(/Rating:.*$/s,'').trim()}</div>
      </div>`:''}

      ${(alertChips||autoChips)?`<div class="chips-row">${alertChips}${autoChips}</div>`:''}
      ${(pri||sec||bg)?`<div class="drivers-row">${drv('PRIMARY',pri)}${drv('SECONDARY',sec)}${drv('CONTEXT',bg)}</div>`:''}

      <div class="rcard-footer">
        <span class="rating-pill ${ratingCls}">${rating.toUpperCase()}</span>
        <span class="pt-lbl">PT: $${pt}</span>
        <span class="src-tag">${item._dataSource?item._dataSource.toUpperCase():''}</span>
      </div>
      <button class="btn-dd" id="dd-btn-${item.ticker}" onclick="deepDive('${item.ticker}')">DEEP DIVE ↓</button>
      <div class="dd-result" id="dd-${item.ticker}" style="display:none">
        <div class="dd-lbl">Institutional Analysis</div>
        <div class="dd-body" id="dd-text-${item.ticker}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── runAnalysis ───────────────────────────────────────────────────────────────
let _analysisRunning = false;
async function runAnalysis() {
  if (_analysisRunning) { console.warn('[PT] runAnalysis: already running, ignoring duplicate call'); return; }
  _analysisRunning = true;
  if (!apiKey && !pplxKey) { _analysisRunning = false; showError('נא להכניס לפחות מפתח API אחד (Anthropic או Perplexity)'); return; }
  if (tickers.length === 0) { _analysisRunning = false; showError('נא להוסיף לפחות טיקר אחד'); return; }

  // HARD STATE RESET
  results = [];
  localStorage.removeItem('pt_results');
  localStorage.removeItem('pt_date');
  window._lastPplxRaw = null;
  window._lastStockData = null;
  if (window._fetchTimestamps) Object.keys(window._fetchTimestamps).forEach(k => delete window._fetchTimestamps[k]);
  document.querySelectorAll('[class*="deepdive-result"]').forEach(el => { el.style.display = 'none'; const txt = el.querySelector('[id^="dd-text-"]'); if (txt) txt.textContent = ''; });
  document.querySelectorAll('[id^="dd-btn-"]').forEach(btn => { btn.textContent = 'Deep Dive — ניתוח מוסדי מעמיק'; btn.disabled = false; });
  const resultsGrid = document.getElementById('cardsGrid');
  if (resultsGrid) resultsGrid.innerHTML = '';
  console.log('[PT] State reset complete — UI cleared');

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'מנתח...';
  document.getElementById('errorBox').style.display = 'none';
  if (document.getElementById('emptyState')) document.getElementById('emptyState').style.display = 'none';

  const today = new Date().toLocaleDateString('he-IL');
  const BATCH_SIZE = 5;
  const allResults = [];

  try {
    setProgress(5, 'מאתחל...');
    for (let i = 0; i < tickers.length; i += BATCH_SIZE) {
      const batch = tickers.slice(i, i + BATCH_SIZE);
      const pct = Math.round(10 + (i / tickers.length) * 80);
      setProgress(pct, `מנתח ${batch.join(', ')}...`);
      const batchResults = await analyzeChunk(batch, today);
      allResults.push(...batchResults);
      results = [...allResults];
      const dateStr = new Date().toLocaleString('he-IL');
      renderResults(allResults, dateStr);
    }

    setProgress(100, 'הניתוח הושלם!');
    const dateStr = new Date().toLocaleString('he-IL');

    const validResults = allResults.filter(r => {
      // Strict schema: must have ticker, numeric score, non-empty summary
      const ok = r &&
        typeof r.ticker === 'string' && r.ticker.length > 0 &&
        typeof r.sentiment_score === 'number' && r.sentiment_score >= 0 && r.sentiment_score <= 100 &&
        typeof r.summary === 'string' && r.summary.length > 50 &&
        ['positive','negative','neutral'].includes(r.sentiment) &&
        // Summary must not contain raw pipeline state
        !r.summary.includes('=== PERPLEXITY') &&
        !r.summary.includes('%%NEWS_CONTEXT') &&
        !r.summary.includes('__raw__');
      if (!ok) console.warn('[PT] REJECTED malformed result:', JSON.stringify(r).slice(0,120));
      return ok;
    });

    const seen = new Set();
    const dedupedResults = [...validResults].reverse().filter(r => {
      if (seen.has(r.ticker)) { console.warn('[PT] DEDUP: dropped stale result for', r.ticker); return false; }
      seen.add(r.ticker); return true;
    }).reverse();

    const runId = Date.now();
    const runTimestamp = new Date().toISOString();
    dedupedResults.forEach(r => { r._runId = runId; r._timestamp = runTimestamp; });

    console.log(`[PT] Saving ${dedupedResults.length} validated results (${allResults.length - dedupedResults.length} dropped)`);
    localStorage.setItem('pt_results', JSON.stringify(dedupedResults));
    localStorage.setItem('pt_date', dateStr);
    results = dedupedResults;
    try {
      renderResults(dedupedResults, dateStr);
    } catch(renderErr) {
      console.error('[PT] renderResults failed:', renderErr.message);
      showError('שגיאה בהצגת התוצאות: ' + renderErr.message);
    }

  } catch (err) {
    hideProgress();
    showError(err.message || 'שגיאה לא ידועה');
    btn.disabled = false;
    btn.textContent = 'הפעל ניתוח יומי';
    document.getElementById('resultsSection').style.display = results.length ? 'block' : 'none';
  } finally {
    _analysisRunning = false;
    btn.disabled = false;
    btn.textContent = 'הפעל ניתוח יומי';
    hideProgress();
  }
}

// ── init ──────────────────────────────────────────────────────────────────────
function init() {
  if (apiKey) { document.getElementById('apiKey').value = apiKey; document.getElementById('keyStatus').textContent = '✓ שמור'; document.getElementById('keyStatus').style.color = 'var(--green)'; }
  else { document.getElementById('keyStatus').textContent = '⚠ נדרש — הכנס key ולחץ שמור'; document.getElementById('keyStatus').style.color = 'orange'; }
  if (pplxKey) { document.getElementById('pplxKey').value = pplxKey; document.getElementById('pplxKeyStatus').textContent = '✓ שמור'; document.getElementById('pplxKeyStatus').style.color = 'var(--green)'; }
  if (avKey) { document.getElementById('avKey').value = avKey; document.getElementById('avKeyStatus').textContent = '✓ שמור'; document.getElementById('avKeyStatus').style.color = 'var(--green)'; }
  renderChips();
  if (results.length) { const dateStr = localStorage.getItem('pt_date') || ''; renderResults(results, dateStr); }
}

init();
// ─────────────────────────────────────────────────────────────────────────────



</script>
