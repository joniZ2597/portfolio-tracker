<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PT // MARKET STATE ENGINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ─── TOKENS — lighter, higher contrast ────────────────── */
:root {
  --bg:      #0a0e14;
  --surface: #0f141c;
  --card:    #131920;
  --card2:   #161d27;
  --border:  #1e2a38;
  --border2: #283848;
  --accent:  #00c0e8;
  --green:   #10c878;
  --red:     #e83850;
  --yellow:  #f0a820;
  --orange:  #e07030;
  --purple:  #8868e0;
  --muted:   #405870;
  --muted2:  #1e2e40;
  --text:    #d0dfe8;      /* lighter */
  --text2:   #7898b0;
  --text3:   #4a6880;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'Inter', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.wrap { max-width: 1600px; margin: 0 auto; padding: 12px 20px; }

/* ─── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
  direction: ltr;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--accent);
  background: rgba(0,192,232,.07); border: 1px solid rgba(0,192,232,.2);
  border-radius: 2px; padding: 3px 8px; letter-spacing: 2px;
}
.brand-name { font-family: var(--mono); font-size: 12px; letter-spacing: .5px; color: var(--text); }
.brand-sub  { font-size: 10px; color: var(--muted); margin-top: 1px; }
.regime-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; direction: ltr; }
.rpill {
  font-family: var(--mono); font-size: 8px; font-weight: 600;
  padding: 3px 8px; border-radius: 2px; border: 1px solid; letter-spacing: .5px; white-space: nowrap;
}
.rpill.on  { color: var(--green);  border-color: rgba(16,200,120,.25);  background: rgba(16,200,120,.07);  }
.rpill.off { color: var(--red);    border-color: rgba(232,56,80,.25);   background: rgba(232,56,80,.07);   }
.rpill.mix { color: var(--yellow); border-color: rgba(240,168,32,.25);  background: rgba(240,168,32,.07);  }
.rpill.inf { color: var(--muted);  border-color: var(--border2); }
.live-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* ─── CONFIG ──────────────────────────────────────────────── */
.config-strip {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 6px; margin-bottom: 9px; direction: ltr;
}
.cfg-row {
  background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
  padding: 7px 11px; display: flex; align-items: center; gap: 7px; direction: ltr;
}
.cfg-lbl {
  font-family: var(--mono); font-size: 8px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; min-width: 52px;
}
.cfg-row input {
  background: transparent; border: none; outline: none; color: var(--text);
  font-family: var(--mono); font-size: 10px; flex: 1; min-width: 0;
}
.cfg-row input::placeholder { color: var(--muted2); }
.btn-cfg {
  font-family: var(--mono); font-size: 8px; color: var(--accent); background: none;
  border: 1px solid rgba(0,192,232,.2); border-radius: 2px; padding: 2px 8px; cursor: pointer;
}
.btn-cfg:hover { background: rgba(0,192,232,.08); }
.cfg-st { font-family: var(--mono); font-size: 9px; color: var(--green); }

/* ─── WATCHLIST ───────────────────────────────────────────── */
.wl-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
  padding: 9px 13px; margin-bottom: 9px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap; direction: ltr;
}
.wl-lbl {
  font-family: var(--mono); font-size: 8px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap;
}
.wl-inp {
  background: var(--bg); border: 1px solid var(--border2); border-radius: 2px;
  color: var(--text); font-family: var(--mono); font-size: 11px;
  padding: 5px 9px; outline: none; width: 90px; text-transform: uppercase;
}
.wl-inp:focus { border-color: var(--accent); }
.btn-add {
  font-family: var(--mono); font-size: 9px; background: rgba(0,192,232,.1);
  border: 1px solid rgba(0,192,232,.22); color: var(--accent); border-radius: 2px;
  padding: 5px 11px; cursor: pointer;
}
.btn-add:hover { background: rgba(0,192,232,.18); }
.btn-ghost {
  font-family: var(--mono); font-size: 9px; background: none;
  border: 1px solid var(--border2); color: var(--muted); border-radius: 2px;
  padding: 5px 9px; cursor: pointer;
}
.btn-ghost:hover { color: var(--text2); }
.chips-wrap { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.chip {
  font-family: var(--mono); font-size: 10px; background: var(--muted2);
  border-radius: 2px; padding: 2px 7px; display: flex; align-items: center; gap: 3px;
}
.chip-x {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 12px; line-height: 1;
}
.chip-x:hover { color: var(--red); }

/* ─── RUN BAR ─────────────────────────────────────────────── */
.run-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; direction: ltr; }
.btn-run {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  background: var(--accent); color: #000; border: none; border-radius: 3px;
  padding: 10px 24px; cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase;
}
.btn-run:hover { opacity: .88; }
.btn-run:disabled { opacity: .3; cursor: not-allowed; }
.prog-wrap { height: 2px; background: var(--border); margin-bottom: 9px; display: none; }
.prog-bar { height: 100%; background: var(--accent); width: 0; transition: width .4s; }
.error-box {
  display: none; font-family: var(--mono); font-size: 10px; color: var(--red);
  background: rgba(232,56,80,.07); border: 1px solid rgba(232,56,80,.18);
  border-radius: 3px; padding: 7px 11px; margin-bottom: 9px;
}
.debug-panel { display: none !important; }

/* ─── RESULTS ─────────────────────────────────────────────── */
.results-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 11px; padding-bottom: 9px; border-bottom: 1px solid var(--border);
  direction: ltr;
}
.res-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.res-date  { font-family: var(--mono); font-size: 9px; color: var(--accent); }
.btn-exp {
  font-family: var(--mono); font-size: 8px; color: var(--muted); background: none;
  border: 1px solid var(--border2); border-radius: 2px; padding: 3px 9px; cursor: pointer;
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(700px, 100%), 1fr));
  gap: 12px; width: 100%;
}
.cards-grid:has(.mse-card:only-child) {
  grid-template-columns: 1fr;
  max-width: 1000px;
}
@media (max-width: 740px) { .cards-grid { grid-template-columns: 1fr; } }

/* ══════════════════════════════════════════════════════════
   MSE CARD — market state engine
══════════════════════════════════════════════════════════ */
.mse-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 4px; overflow: hidden; direction: ltr;
}
.mse-card.positive { border-top: 2px solid var(--green); }
.mse-card.negative { border-top: 2px solid var(--red); }
.mse-card.neutral  { border-top: 2px solid var(--muted); }

/* ─ HEADER ─────────────────────────────────────────────── */
.mse-header {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px 9px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.mse-id    { display: flex; align-items: baseline; gap: 9px; flex: 1; flex-wrap: wrap; }
.mse-ticker { font-family: var(--mono); font-size: 20px; font-weight: 700; letter-spacing: .5px; }
.mse-price  { font-family: var(--mono); font-size: 15px; color: var(--text2); }
.mse-chg    { font-family: var(--mono); font-size: 14px; font-weight: 600; }
.mse-chg.pos { color: var(--green); }
.mse-chg.neg { color: var(--red);   }
.mse-spark  { opacity: .9; flex-shrink: 0; }
.mse-co     { font-size: 11px; color: var(--muted); flex: 1; min-width: 100%; order: 2; margin-top: 1px; }
.mse-badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }

/* Badge styles */
.setup-pill {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  padding: 3px 10px; border-radius: 3px; border: 1px solid;
}
.setup-pill.ap    { color: #00e878; border-color: rgba(0,232,120,.3);  background: rgba(0,232,120,.08); }
.setup-pill.a     { color: var(--green);  border-color: rgba(16,200,120,.28); background: rgba(16,200,120,.07); }
.setup-pill.b     { color: var(--yellow); border-color: rgba(240,168,32,.28); background: rgba(240,168,32,.07); }
.setup-pill.c     { color: var(--orange); border-color: rgba(224,112,48,.28); background: rgba(224,112,48,.07); }
.setup-pill.avoid { color: var(--red);    border-color: rgba(232,56,80,.28);  background: rgba(232,56,80,.07); }

.phase-pill {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  padding: 3px 8px; border-radius: 2px; border: 1px solid; white-space: nowrap;
}
.phase-pill.accumulation { color: #50c8e8; border-color: rgba(80,200,232,.25); background: rgba(80,200,232,.07); }
.phase-pill.continuation { color: var(--green);  border-color: rgba(16,200,120,.25); background: rgba(16,200,120,.07); }
.phase-pill.base         { color: var(--yellow); border-color: rgba(240,168,32,.25); background: rgba(240,168,32,.07); }
.phase-pill.distribution { color: var(--red);    border-color: rgba(232,56,80,.25);  background: rgba(232,56,80,.07); }
.phase-pill.correction   { color: var(--orange); border-color: rgba(224,112,48,.25); background: rgba(224,112,48,.07); }
.phase-pill.extended     { color: var(--purple); border-color: rgba(136,104,224,.25);background: rgba(136,104,224,.07); }
.phase-pill.base         { color: var(--yellow); border-color: rgba(240,168,32,.25); background: rgba(240,168,32,.07); }

.sent-pill {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 2px; border: 1px solid;
}
.sent-pill.positive { color: var(--green);  border-color: rgba(16,200,120,.25); background: rgba(16,200,120,.08); }
.sent-pill.negative { color: var(--red);    border-color: rgba(232,56,80,.25);  background: rgba(232,56,80,.08); }
.sent-pill.neutral  { background: var(--muted2); color: var(--text2); border: 1px solid var(--border2); }

/* ─ MARKET STATE ROW ──────────────────────────────────── */
.state-row {
  display: grid; grid-template-columns: repeat(6,1fr);
  border-bottom: 1px solid var(--border);
  background: var(--card2);
}
.state-cell {
  padding: 9px 14px; display: flex; flex-direction: column; gap: 3px;
  border-right: 1px solid var(--border);
}
.state-cell:last-child { border-right: none; }
.state-lbl { font-family: var(--mono); font-size: 7px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.state-val { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--text); }
.state-val.pos  { color: var(--green);  }
.state-val.neg  { color: var(--red);    }
.state-val.warn { color: var(--yellow); }

/* ─ METRICS ROW ───────────────────────────────────────── */
.metrics-row {
  display: grid; grid-template-columns: 1fr 180px 1fr;
  border-bottom: 1px solid var(--border);
}
.score-col { padding: 12px 16px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.srow { display: flex; align-items: center; gap: 8px; }
.s-lbl { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; width: 64px; flex-shrink: 0; }
.s-track { flex: 1; height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; position: relative; min-width: 80px; }
.s-fill  { height: 100%; border-radius: 3px; }
.s-fill.positive { background: var(--green);  }
.s-fill.negative { background: var(--red);    }
.s-fill.neutral  { background: var(--muted);  }
.s-fill.conf-hi  { background: var(--green);  }
.s-fill.conf-md  { background: var(--yellow); }
.s-fill.conf-lo  { background: var(--muted);  }
.s-fill.bull-f   { position: absolute; left: 0; top: 0; height: 100%; background: var(--green); border-radius: 3px; }
.s-num  { font-family: var(--mono); font-size: 11px; color: var(--text2); min-width: 60px; text-align: right; }
.s-num.conf-hi { color: var(--green);  }
.s-num.conf-md { color: var(--yellow); }
.s-num.conf-lo { color: var(--muted);  }
.s-num.rating-buy  { color: var(--green); font-weight: 700; }
.s-num.rating-sell { color: var(--red);   font-weight: 700; }
.s-num.rating-hold { color: var(--muted); font-weight: 700; }

/* Checklist */
.chk-col { padding: 12px 14px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
.chk { display: flex; align-items: center; gap: 6px; min-height: 19px; }
.chk-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.chk-dot.pass { background: var(--green);  }
.chk-dot.fail { background: var(--red);    }
.chk-dot.warn { background: var(--yellow); }
.chk-dot.na   { background: var(--muted2); }
.chk-l { font-family: var(--mono); font-size: 9px; color: var(--text2); flex: 1; }
.chk-v { font-family: var(--mono); font-size: 9px; font-weight: 700; text-align: right; min-width: 28px; }
.chk-v.pass { color: var(--green);  }
.chk-v.fail { color: var(--red);    }
.chk-v.warn { color: var(--yellow); }
.chk-v.na   { color: var(--muted);  }

/* Right col — sessions + chips */
.right-col { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.session-bars { display: flex; gap: 8px; align-items: flex-end; }
.sbar-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.sbar-date { font-family: var(--mono); font-size: 7px; color: var(--muted); }
.sbar-col  { width: 5px; border-radius: 2px; min-height: 2px; }
.sbar-col.up { background: var(--green);  }
.sbar-col.dn { background: var(--red);    }
.sbar-col.fl { background: var(--muted2); }
.sbar-pct  { font-family: var(--mono); font-size: 7px; }
.sbar-pct.up    { color: var(--green);  }
.sbar-pct.dn    { color: var(--red);    }
.sbar-pct.fl    { color: var(--muted);  }
.sbar-pct.muted { color: var(--muted);  }

/* Catalyst chips */
.catalyst-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.ctag {
  font-family: var(--mono); font-size: 8px; font-weight: 600;
  padding: 3px 7px; border-radius: 2px; border: 1px solid; white-space: nowrap;
}
.ctag.pos   { color: var(--green);  border-color: rgba(16,200,120,.28); background: rgba(16,200,120,.07); }
.ctag.neg   { color: var(--red);    border-color: rgba(232,56,80,.28);  background: rgba(232,56,80,.07); }
.ctag.warn  { color: var(--yellow); border-color: rgba(240,168,32,.28); background: rgba(240,168,32,.07); }
.ctag.info  { color: var(--accent); border-color: rgba(0,192,232,.22);  background: rgba(0,192,232,.06); }
.ctag.muted { color: var(--muted);  border-color: var(--border2); background: transparent; }

/* ─ ACTIONABLE TAKE ───────────────────────────────────── */
.action-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  border-left: 3px solid var(--accent); background: rgba(0,192,232,.03);
}
.action-tag {
  font-family: var(--mono); font-size: 8px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; padding-top: 2px;
}
.action-body { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.6; flex: 1; }

/* ─ RESEARCH MEMO ─────────────────────────────────────── */
.memo-btn {
  width: 100%; padding: 9px 16px; background: none; border: none;
  border-top: 1px solid var(--border); color: var(--muted);
  font-family: var(--mono); font-size: 8px; text-transform: uppercase; letter-spacing: 1px;
  cursor: pointer; display: flex; align-items: center; gap: 10px;
}
.memo-btn::before, .memo-btn::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
.memo-btn:hover { color: var(--text2); }

.memo-panel { border-top: 1px solid var(--border); background: rgba(0,0,0,.2); }
.memo-row {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 9px 16px; border-bottom: 1px solid var(--border);
}
.memo-tag {
  font-family: var(--mono); font-size: 8px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
  padding-top: 2px; min-width: 60px;
}
.memo-val { font-size: 12px; color: var(--text2); line-height: 1.6; }

.dd-wrap { padding: 11px 16px; }
.dd-btn {
  width: 100%; padding: 9px; background: rgba(0,192,232,.06);
  border: 1px solid rgba(0,192,232,.18); border-radius: 3px;
  color: var(--accent); font-family: var(--mono); font-size: 9px;
  text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
}
.dd-btn:hover { background: rgba(0,192,232,.12); }
.dd-lbl  { font-family: var(--mono); font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 5px; }
.dd-body { font-size: 12px; color: var(--text2); line-height: 1.7; }

/* ─ EMPTY ─────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 64px 20px; color: var(--muted); }
.empty-icon  { font-family: var(--mono); font-size: 24px; margin-bottom: 14px; opacity: .28; }
.empty-title { font-family: var(--mono); font-size: 12px; margin-bottom: 6px; color: var(--text2); }
.empty-desc  { font-size: 11px; color: var(--muted); line-height: 1.7; }
#progressLabel { font-family: var(--mono); font-size: 9px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">MSE</div>
      <div>
        <div class="brand-name">MARKET STATE ENGINE</div>
        <div class="brand-sub">Institutional Signal Dashboard</div>
      </div>
    </div>
    <div class="regime-bar" id="regimeBar">
      <div class="live-dot"></div>
      <span class="rpill inf">READY</span>
    </div>
  </div>

  <div class="config-strip">
    <div class="cfg-row">
      <span class="cfg-lbl">ANTHROPIC</span>
      <input type="password" id="apiKey" placeholder="sk-ant-..."/>
      <button class="btn-cfg" onclick="saveKey()">SAVE</button>
      <span class="cfg-st" id="keyStatus"></span>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl">PERPLEXITY</span>
      <input type="password" id="pplxKey" placeholder="pplx-..."/>
      <button class="btn-cfg" onclick="savePplxKey()">SAVE</button>
      <span class="cfg-st" id="pplxKeyStatus"></span>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl">ALPHA VAL</span>
      <input type="password" id="avKey" placeholder="AV key..."/>
      <button class="btn-cfg" onclick="saveAvKey()">SAVE</button>
      <span class="cfg-st" id="avKeyStatus"></span>
    </div>
  </div>

  <div class="wl-bar">
    <span class="wl-lbl">WATCHLIST</span>
    <div style="display:flex;align-items:center;gap:5px">
      <input class="wl-inp" type="text" id="tickerInput" placeholder="AAPL" maxlength="10"
        onkeydown="if(event.key==='Enter') addTicker()"/>
      <button class="btn-add" onclick="addTicker()">+ ADD</button>
      <button class="btn-ghost" onclick="loadSample()">↺ Portfolio</button>
      <button class="btn-ghost" onclick="clearAll()">Clear</button>
    </div>
    <div class="chips-wrap" id="tickerChips"></div>
  </div>

  <div class="run-bar">
    <button class="btn-run" id="runBtn" onclick="runAnalysis()">RUN ANALYSIS</button>
    <span id="progressLabel"></span>
  </div>

  <div class="debug-panel" id="debugPanel"><div id="debugContent"></div></div>
  <div class="error-box" id="errorBox"></div>
  <div class="prog-wrap" id="progressWrap"><div class="prog-bar" id="progressBar"></div></div>

  <div id="resultsSection" style="display:none">
    <div class="results-hdr">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="res-label">MARKET STATE OUTPUT</span>
        <span class="res-date" id="resultsDate"></span>
      </div>

function isValidStockData(d) {

// Fetch from Yahoo Finance via proxy
async function fetchYahoo(symbol) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  const proxied = YAHOO_PROXY + encodeURIComponent(url);
  const res = await fetch(proxied, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('Yahoo HTTP ' + res.status);
  const json = await res.json();
  const meta = json?.chart?.result?.[0]?.meta;
  if (!meta) throw new Error('Yahoo: no meta for ' + symbol);
  return {
    symbol:         symbol,
    price:          parseFloat(meta.regularMarketPrice),
    change_percent: meta.previousClose ? parseFloat(((meta.regularMarketPrice - meta.previousClose) / meta.previousClose * 100).toFixed(2)) : 0,
    high:           parseFloat(meta.regularMarketDayHigh),
    low:            parseFloat(meta.regularMarketDayLow),
    open:           parseFloat(meta.regularMarketOpen),
    previous_close: parseFloat(meta.previousClose),
    volume:         parseInt(meta.regularMarketVolume),
    timestamp:      new Date(meta.regularMarketTime * 1000).toISOString(),
    source:         'yahoo'
  };
}

// Fetch from Alpha Vantage using TIME_SERIES_INTRADAY (real intraday high/low)
async function fetchAlphaVantage(symbol) {
  if (!avKey) throw new Error('Alpha Vantage key missing');

  // Step 1: get previous close via GLOBAL_QUOTE
  const gqUrl = `${AV_BASE}?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${avKey}`;
  const gqRes = await fetch(gqUrl, { signal: AbortSignal.timeout(8000) });
  if (!gqRes.ok) throw new Error('AV GQ HTTP ' + gqRes.status);
  const gqJson = await gqRes.json();
  const q = gqJson?.['Global Quote'];
  if (!q || !q['05. price']) throw new Error('AV: no data for ' + symbol);

  const price          = parseFloat(q['05. price']);
  const previous_close = parseFloat(q['08. previous close']);
  const change_percent = parseFloat(q['10. change percent'].replace('%', ''));
  const open           = parseFloat(q['02. open']);
  const volume         = parseInt(q['06. volume']);

  // Step 2: get real intraday high/low from TIME_SERIES_INTRADAY (15min)
  let high = parseFloat(q['03. high']);
  let low  = parseFloat(q['04. low']);
  try {
    const tsUrl = `${AV_BASE}?function=TIME_SERIES_INTRADAY&symbol=${symbol}&interval=15min&outputsize=compact&apikey=${avKey}`;
    const tsRes = await fetch(tsUrl, { signal: AbortSignal.timeout(8000) });
    if (tsRes.ok) {
      const tsJson = await tsRes.json();
      const series = tsJson?.['Time Series (15min)'];
      if (series) {
        const candles = Object.values(series);
        // Calculate true intraday high/low from all 15min candles today
        const highs = candles.map(c => parseFloat(c['2. high'])).filter(v => !isNaN(v));
        const lows  = candles.map(c => parseFloat(c['3. low'])).filter(v => !isNaN(v));
        if (highs.length) high = Math.max(...highs);
        if (lows.length)  low  = Math.min(...lows);
      }
    }
  } catch(e) {
    // Keep GLOBAL_QUOTE high/low as fallback → already set above
    console.warn('AV intraday fallback for ' + symbol + ':', e.message);
  }

  return {
    symbol, price, change_percent, high, low,
    open, previous_close, volume,
    timestamp: new Date().toISOString(),
    source: 'alphavantage'
  };
}

// Main: fetch with Yahoo → fallback Alpha Vantage
async function fetchStockData(symbol) {

    } catch(e2) {
      console.warn(`Alpha Vantage failed for ${symbol}: ${e2.message}`);

    }
  }
}

  const ticker = batch[0];
  const query = `Report on ${ticker} for the past 7 days. EXACTLY this format. No markdown. No hedging.

Use NONE for any field with no data. Be specific with numbers and dates.`;

  });

// ── Parse Perplexity markdown/text into structured object ───────────────────
function parsePerplexityContext(raw) {
  const result = {};
  if (!raw || raw.length < 10) return result;
  const lines = raw.split('\n');
  let currentTicker = null, currentLines = [];

  const flushTicker = () => {
    if (!currentTicker || !currentLines.length) return;
    const block = currentLines.join('\n');
    const analystActions = [];
    const ptRe = /\b(Goldman|GS|Morgan Stanley|MS|JPMorgan|JPM|UBS|BofA|Bank of America|CFRA|Citi|Barclays|Jefferies|Wedbush|Needham|KeyBanc|Wells Fargo|Deutsche|Raymond James|Piper Sandler)[^\n]*?\$([0-9,]+)/gi;
    let ptMatch;
    while ((ptMatch = ptRe.exec(block)) !== null) {
      const target = parseFloat(ptMatch[2].replace(',', ''));
      if (target > 0 && target < 5000) analystActions.push({ bank: ptMatch[1], target, raw: ptMatch[0].slice(0, 80) });
    }
    const bullish = [], bearish = [];
    currentLines.forEach(l => {
      const ll = l.toLowerCase();
      if (ll.includes('bullish') || ll.includes('beat') || ll.includes('strong demand') || ll.includes('ai demand') || ll.includes('hbm') || ll.includes('upside')) {
        const clean = l.replace(/^[-*•#>\s]+/, '').trim();
        if (clean.length > 10) bullish.push(clean.slice(0, 100));
      }
      if (ll.includes('bearish') || ll.includes('risk') || ll.includes('pressure') || ll.includes('declining') || ll.includes('downside')) {
        const clean = l.replace(/^[-*•#>\s]+/, '').trim();
        if (clean.length > 10) bearish.push(clean.slice(0, 100));
      }
    });
    // Extract revision direction
    const revLine = currentLines.find(l => l.startsWith('REVISION_DIRECTION:'));
    const revDir = revLine ? revLine.replace('REVISION_DIRECTION:', '').trim() : 'unknown';
    const recLine = currentLines.find(l => l.startsWith('REVISION_RECENCY:'));
    const revRecency = recLine ? recLine.replace('REVISION_RECENCY:', '').trim() : 'unknown';
    const freshLine = currentLines.find(l => l.startsWith('DATA_FRESHNESS:'));
    const dataFreshness = freshLine ? freshLine.replace('DATA_FRESHNESS:', '').trim() : 'unknown';
    const earnLine = currentLines.find(l => l.startsWith('EARNINGS:'));
    const earnings = earnLine ? earnLine.replace('EARNINGS:', '').trim() : 'NONE';

    result[currentTicker] = {
      analystActions: analystActions.slice(0, 5),
      bullishCatalysts: bullish.slice(0, 4),
      bearishCatalysts: bearish.slice(0, 4),
      macroDrivers: [], institutionalFlows: [], risks: bearish.slice(0, 3),
      revisionDirection: revDir,
      revisionRecency: revRecency,
      dataFreshness,
      earnings
    };
    console.log(`[PT] Parsed ${currentTicker}: ${analystActions.length} analyst actions, ${bullish.length} bullish`);
    if (analystActions.length) console.log('[PT] Analyst actions:', JSON.stringify(analystActions));
  };

  for (const line of lines) {
    const tickerMatch = line.match(/^(?:TICKER:|##|\*\*)\s*([A-Z]{1,6})(?:\b|\*\*)/);
    if (tickerMatch) { flushTicker(); currentTicker = tickerMatch[1]; currentLines = []; }
    else if (currentTicker) currentLines.push(line);
  }
  flushTicker();

  if (Object.keys(result).length === 0 && raw.length > 50) {
    console.warn('[PT] No ticker headers found, using full text as context');
    result['__raw__'] = { rawText: raw, analystActions: [], bullishCatalysts: [], bearishCatalysts: [], macroDrivers: [], risks: [] };
    const ptRe2 = /\b(Goldman|GS|Morgan Stanley|UBS|BofA|CFRA|Citi|Barclays|Jefferies|Wedbush)[^\n]*?\$([0-9,]+)/gi;
    let m2;
    while ((m2 = ptRe2.exec(raw)) !== null) {
      const t = parseFloat(m2[2].replace(',', ''));
      if (t > 0 && t < 5000) result['__raw__'].analystActions.push({ bank: m2[1], target: t, raw: m2[0].slice(0, 80) });
    }
  }
  return result;
}

function formatNewsContext(pplxData, symbol) {
  const d = pplxData[symbol] || pplxData['__raw__'];
  if (!d) return `No research data for ${symbol}.`;
  const lines = [];
  // Analyst actions with freshness context
  if (d.analystActions?.length) {
    const ptStr = d.analystActions.map(a => `${a.bank} PT $${a.target}`).join(' | ');
    const freshTag = d.dataFreshness && d.dataFreshness !== 'unknown' ? ` [data: ${d.dataFreshness}]` : '';
    lines.push('ANALYST ACTIONS: ' + ptStr + freshTag);
  } else {
    lines.push('ANALYST ACTIONS: No verified analyst PTs in current data');
  }
  // Revision direction — critical for weighting
  if (d.revisionDirection && d.revisionDirection !== 'unknown' && d.revisionDirection !== 'NONE') {
    lines.push('REVISION DIRECTION: ' + d.revisionDirection + (d.revisionRecency !== 'unknown' ? ' (most recent: ' + d.revisionRecency + ')' : ''));
  }
  if (d.earnings && d.earnings !== 'NONE') lines.push('EARNINGS: ' + d.earnings);
  if (d.bullishCatalysts?.length) lines.push('BULLISH: ' + d.bullishCatalysts.join(' | '));
  if (d.bearishCatalysts?.length) lines.push('BEARISH: ' + d.bearishCatalysts.join(' | '));
  if (d.macroDrivers?.length)     lines.push('MACRO: ' + d.macroDrivers.join(' | '));
  if (d.risks?.length)            lines.push('RISKS: ' + d.risks.join(' | '));
  if (d.rawText)                  lines.push('RAW CONTEXT: ' + d.rawText.slice(0, 400));
  return lines.length ? lines.join('\n') : `No specific catalysts found for ${symbol}.`;
}

const _fetchTimestamps = {};
function isStale(symbol, maxAgeMs = 5 * 60 * 1000) {
  const ts = _fetchTimestamps[symbol];
  if (!ts) return false;
  const age = Date.now() - ts;
  if (age > maxAgeMs) { console.warn(`[PT] STALE: ${symbol} is ${Math.round(age/1000)}s old`); return true; }
  return false;
}

// ── JSON repair ──────────────────────────────────────────────────────────────
function repairJSON(str) {
  str = str.replace(/,\s*([\]}])/g, '$1');
  let opens = 0, inStr = false, escape = false;
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (escape) { escape = false; continue; }
    if (c === '\\' && inStr) { escape = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{' || c === '[') opens++;
    if (c === '}' || c === ']') opens--;
  }
  const lastComplete = str.lastIndexOf('}]');
  if (opens > 0 && lastComplete > 0) str = str.slice(0, lastComplete + 2) + '}';
  return str;
}

function parseJSON(raw) {
  let clean = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const start = clean.indexOf('{');
  const end   = clean.lastIndexOf('}');
  if (start === -1) { console.warn('[PT] parseJSON: no { found'); return { results: [] }; }
  let jsonStr = end > start ? clean.slice(start, end + 1) : clean.slice(start);
  try { return JSON.parse(jsonStr); } catch(e1) {}
  try { return JSON.parse(repairJSON(jsonStr)); } catch(e2) {}
  console.warn('[PT] parseJSON: falling back to per-ticker extraction');
  const items = [];
  const tickerRe = /\{[^{}]*"ticker"\s*:\s*"([^"]+)"[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/g;
  let m;
  while ((m = tickerRe.exec(jsonStr)) !== null) {
    try { const obj = JSON.parse(m[0].replace(/,\s*$/, '')); if (obj.ticker) items.push(obj); } catch(e3) {}
  }
  console.log('[PT] parseJSON: extracted', items.length, 'items via fallback');
  return { results: items };
}

- Verified Tier1 negative (earnings miss, guidance cut): 25-45
- No verified catalysts: 42-55

Summary MUST end: "Rating: Buy/Neutral/Sell | PT: $[consensus or single-verified] or consensus unavailable | Do not chase strength"`;

  const user = `VERIFIED PRICE DATA:
${dataSection}

STRUCTURED RESEARCH (extracted facts — use for drivers):
${researchByTicker}

OUTPUT — raw JSON only, no fences:
{"results":[{"ticker":"X","company_name":"Full Name","sentiment":"positive/negative/neutral","sentiment_score":0-100,"summary":"[Key Event]...[Root Cause]...[Price Context]...[Bull vs Bear]...[Actionable Take]...Rating: Buy/Neutral/Sell | PT: $X | Do not chase strength","alerts":[{"type":"critical/normal","text":"specific alert"}],"news":["Primary: [driver]","Secondary: [driver]","Background: [context]"]}]}

Tickers: ${batch.join(',')}`;

  console.log('[PT] Anthropic user prompt length:', user.length);

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 3000, system: system, messages: [{ role: 'user', content: user }, { role: 'assistant', content: '{' }] })
  });
  if (!response.ok) { const err = await response.json(); throw new Error('Anthropic: ' + (err.error?.message || 'API error')); }
  const data = await response.json();
  let textContent = '';
  for (const block of data.content) { if (block.type === 'text') textContent += block.text; }

  let fullResponse = textContent.trim();
  if (fullResponse.startsWith('"ticker"') || fullResponse.startsWith('"results"')) {
    fullResponse = '{' + fullResponse;
    if (fullResponse.includes('"ticker"') && !fullResponse.includes('"results"')) fullResponse = '{"results":[' + fullResponse + ']}';
  } else if (fullResponse.startsWith('{')) {
    if (fullResponse.includes('"ticker"') && !fullResponse.includes('"results"')) fullResponse = '{"results":[' + fullResponse + ']}';
  } else if (fullResponse.startsWith('[')) {
    fullResponse = '{"results":' + fullResponse + '}';
  } else {
    fullResponse = '{"results":[{' + fullResponse + ']}';
  }
  console.log('[PT] Anthropic response OK, length:', fullResponse.length);
  console.log('[PT] Response first chars:', fullResponse.slice(0, 60));
  return fullResponse;
}

// ── Perplexity-only analysis ─────────────────────────────────────────────────
async function fetchPerplexityAnalysis(batch, today, stockContext = '') {
  const prompt = `You are a high-conviction hedge fund analyst. Decisive. Data-driven.
${stockContext ? 'VERIFIED PRICE DATA (use ONLY these numbers):\n' + stockContext + '\n' : ''}
For each ticker: ${batch.join(',')} write one institutional paragraph.
Structure: Key Event → Root Cause → Price Context → Bull vs Bear → Actionable Take
End: "Rating: Buy/Neutral/Sell | PT: $X | Do not chase strength"
Output STRICT JSON only — no backticks:
{"results":[{"ticker":"X","company_name":"Name","sentiment":"positive/negative/neutral","sentiment_score":0-100,"summary":"paragraph","alerts":[{"type":"critical/normal","text":"text"}],"news":["catalyst 1","catalyst 2"]}]}`;

  const response = await fetch('https://api.perplexity.ai/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${pplxKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'sonar-pro', messages: [{ role: 'user', content: prompt }], max_tokens: 1500 })
  });
  if (!response.ok) { const err = await response.json(); throw new Error('Perplexity: ' + (err.error?.message || 'API error')); }
  const data = await response.json();
  return data.choices[0].message.content.trim();
}

// ── Orchestration layer ──────────────────────────────────────────────────────
function orchestrate(claudeResults, pplxData, stockData) {
  return claudeResults.map(item => {
    const sym = item.ticker;
    const mkt  = stockData?.[sym];
    const pplx = pplxData?.[sym] || pplxData?.['__raw__'];

    if (mkt) { item._verifiedPrice = mkt.price; item._verifiedChangePct = mkt.change_percent; item._dataSource = mkt.source; }

    if (pplx?.analystActions?.length) {
      const ptMentioned = pplx.analystActions.some(a => item.summary?.includes(a.bank) || item.summary?.includes('$' + a.target));
      if (!ptMentioned) {
        item.alerts = item.alerts || [];
        pplx.analystActions.forEach(a => {
          item.alerts.push({ type: 'critical', text: `${a.bank} price target $${a.target} — verify if recent` });
        });
      }
    }

    if (item.alerts?.length) {
      const seen = new Set();
      item.alerts = item.alerts.filter(a => { const key = (a.text||'').slice(0,50); if (seen.has(key)) return false; seen.add(key); return true; });
    }

    const chg = mkt?.change_percent ?? 0;
    if (chg < -5 && item.sentiment_score > 60) { console.warn(`[PT] Orchestrate: score override ${sym} down ${chg}%`); item.sentiment_score = Math.min(item.sentiment_score, 45); item.sentiment = 'negative'; }
    if (chg > 5  && item.sentiment_score < 40) { console.warn(`[PT] Orchestrate: score override ${sym} up ${chg}%`);   item.sentiment_score = Math.max(item.sentiment_score, 55); item.sentiment = 'positive'; }

    item._orchestrated = true;
    item._orchestratedAt = new Date().toISOString();
    return item;
  });
}

// ── Score consistency enforcement ────────────────────────────────────────────
function enforceScoreConsistency(results, newsContext) {
  const tierOneBullish = ['raised pt', 'raised price target', 'pt hike', 'upgrade', 'earnings beat', 'revenue beat', 'buy rating initiated'];
  const tierOneBearish = ['downgrade', 'cut pt', 'sell rating', 'missed earnings', 'guidance cut'];
  const ctxLower = (newsContext || '').toLowerCase();
  const bullishCount = tierOneBullish.filter(s => ctxLower.includes(s)).length;
  const bearishCount = tierOneBearish.filter(s => ctxLower.includes(s)).length;

  return results.map(item => {
    const score = item.sentiment_score || 50;
    const chgPct = item._changePct || 0;
    if (typeof chgPct === 'number' && chgPct < -3) { console.log(`[PT] enforceScore: skipping boost for ${item.ticker} (down day ${chgPct}%)`); return item; }
    if (bullishCount >= 2 && bearishCount === 0 && score < 65) { console.warn(`[PT-SCORE] ${item.ticker}: Tier1 boost ${score} → 72`); return { ...item, sentiment: 'positive', sentiment_score: 72 }; }
    return item;
  });
}

// ── analyzeChunk ─────────────────────────────────────────────────────────────
async function analyzeChunk(batch, today) {
  // Enforce single-ticker mode — split multi-ticker into sequential single runs
  if (batch.length > 1) {
    console.log(`[PT] Multi-ticker batch: running sequentially for isolation`);
    const allResults = [];
    for (const sym of batch) {
      const r = await analyzeChunk([sym], today);
      allResults.push(...r);
    }
    return allResults;
  }
  console.log(`[PT] analyzeChunk START: ${batch[0]}`);
  let rawText = '', pplxData = {}, stockData = {};

  stockData = await fetchBatchStockData(batch);
  batch.forEach(sym => { _fetchTimestamps[sym] = Date.now(); });
  batch.forEach(sym => {
    const d = stockData[sym];
    if (d) console.log(`[PT] Market OK: ${sym} $${d.price} ${d.change_percent}% [${d.source}]`);
    else   console.warn(`[PT] Market MISS: ${sym}`);
  });
  const stockContext = formatStockContext(stockData);

  if (apiKey && pplxKey) {
    // Per-ticker isolation: call Perplexity once per ticker, never batch
    for (const sym of batch) {
      try {
        const raw = await fetchPerplexityContext([sym]); // single ticker only
        const parsed = parsePerplexityContext(raw);
        // Merge into pplxData — only under the correct ticker key
        if (parsed[sym]) {
          pplxData[sym] = parsed[sym];
          console.log(`[PT] Perplexity OK for ${sym}: ${parsed[sym].analystActions?.length || 0} analyst actions`);
        } else if (parsed['__raw__']) {
          // Fallback: tag raw context under the correct ticker
          pplxData[sym] = { ...parsed['__raw__'], _ticker: sym };
          console.log(`[PT] Perplexity raw fallback for ${sym}`);
        }
      } catch(e) { console.warn(`[PT] Perplexity failed for ${sym}:`, e.message); }
    }
    console.log(`[PT] Perplexity parsed tickers: ${Object.keys(pplxData).join(',') || 'none'}`);

    // Debug: console only — never expose to UI
    console.log('[PT] stockContext length:', stockContext.length);
    console.log('[PT] pplxData keys:', Object.keys(pplxData).join(','));

    rawText = await fetchAnthropicAnalysis(batch, today, stockContext + '\n%%NEWS_CONTEXT_START%%\n' + JSON.stringify(pplxData));
  } else if (apiKey) {
    rawText = await fetchAnthropicAnalysis(batch, today, stockContext);
  } else if (pplxKey) {
    rawText = await fetchPerplexityAnalysis(batch, today, stockContext);
  }

  console.log('[PT] Claude raw response length:', rawText.length);
  const parsed = parseJSON(rawText);
  const raw = parsed.results || [];

  const orchestrated = orchestrate(raw, pplxData, stockData);

  window._lastRunState = { stockData, pplxData, runId: Date.now(), timestamp: new Date().toISOString() };

  const resultsWithPct = orchestrated.map(item => {
    const mkt = stockData[item.ticker];
    return mkt ? { ...item, _changePct: mkt.change_percent } : item;
  });
  return enforceScoreConsistency(resultsWithPct, pplxKey ? JSON.stringify(pplxData) : '');
}

// ── renderResults ────────────────────────────────────────────────────────────
function renderResults(allResults, dateStr) {
  const grid = document.getElementById('cardsGrid');
  const section = document.getElementById('resultsSection');
  const dateEl = document.getElementById('resultsDate');
  if (!grid) return;
  if (dateEl) dateEl.textContent = dateStr;
  if (section) section.style.display = 'block';
  const es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';

  // Regime bar
  const rb = document.getElementById('regimeBar');
  if (rb) {
    const avg = allResults.length ? Math.round(allResults.reduce((s,r)=>s+(r.sentiment_score||50),0)/allResults.length) : 50;
    const [rLbl,rCls] = avg>=65?['RISK-ON','on']:avg<=40?['RISK-OFF','off']:['MIXED','mix'];
    rb.innerHTML = `<div class="live-dot"></div>
      <span class="rpill ${rCls}">${rLbl}</span>
      <span class="rpill inf">AVG ${avg}/100</span>
      <span class="rpill inf">${allResults.length} TICKERS · ${dateStr}</span>`;
  }

  grid.innerHTML = allResults.map(item => {
    const score = item.sentiment_score || 50;
    const sent  = item.sentiment==='positive'?'positive':item.sentiment==='negative'?'negative':'neutral';
    const chg   = typeof item._verifiedChangePct==='number' ? item._verifiedChangePct : null;
    const price = item._verifiedPrice ? `$${item._verifiedPrice.toFixed(2)}` : '';
    const sum   = item.summary || '';
    const sl    = sum.toLowerCase();

    // Parse actionable only (no long sections)
    const getS = tag => {
      const m = sum.match(new RegExp(tag+':?\\s*(.+?)(?=KEY EVENT:|ROOT CAUSE:|PRICE CONTEXT:|BULL VS BEAR:|ACTIONABLE TAKE:|Rating:|$)','si'));
      return m ? m[1].trim().replace(/\n/g,' ').replace(/\s+/g,' ') : '';
    };
    const actionable = getS('ACTIONABLE TAKE');
    const keyEvent   = getS('KEY EVENT');

    // Rating / PT
    const rM = sum.match(/Rating:\s*(Buy|Neutral|Sell)/i);
    const pM = sum.match(/PT:\s*\$?([\d,.]+|consensus unavailable)/i);
    const rating    = rM?rM[1]:'Neutral';
    const pt        = pM?pM[1]:'N/A';
    const ratingCls = rating.toLowerCase()==='buy'?'buy':rating.toLowerCase()==='sell'?'sell':'hold';

    // ── SETUP GRADE ─────────────────────────────────────
    const hasCrit = (item.alerts||[]).some(a=>a.type==='critical');
    let sg='C', sc='c';
    if(score>=78&&!hasCrit){sg='A+';sc='ap'}
    else if(score>=68&&!hasCrit){sg='A';sc='a'}
    else if(score>=55){sg='B';sc='b'}
    else if(score>=42){sg='C';sc='c'}
    else{sg='AVOID';sc='avoid'}

    // ── TREND PHASE ──────────────────────────────────────
    let phase='RANGE', phaseCls='base';
    if(sl.includes('accumulation')){phase='ACCUMULATION';phaseCls='accumulation'}
    else if(sl.includes('continuation')){phase='CONTINUATION';phaseCls='continuation'}
    else if(sl.includes('base formation')||sl.includes('basing')){phase='BASE';phaseCls='base'}
    else if(sl.includes('distribution')){phase='DISTRIBUTION';phaseCls='distribution'}
    else if(sl.includes('correction')||sl.includes('pullback')||sl.includes('profit-taking')){phase='CORRECTION';phaseCls='correction'}
    else if(sl.includes('extended')||sl.includes('overextended')){phase='EXTENDED';phaseCls='extended'}
    else if(chg!==null&&chg<-3){phase='CORRECTION';phaseCls='correction'}
    else if(chg!==null&&chg>3){phase='CONTINUATION';phaseCls='continuation'}

    // ── MARKET STATE SIGNALS (row of state badges) ───────
    const chgStr  = chg!==null?`${chg>=0?'+':''}${chg.toFixed(2)}%`:'—';
    const chgCls  = chg===null?'':chg>0.5?'pos':chg<-0.5?'neg':'';
    const volReg  = Math.abs(chg||0)>4?'ELEVATED':Math.abs(chg||0)>1.5?'NORMAL':'LOW';
    const volCls  = volReg==='ELEVATED'?'warn':volReg==='NORMAL'?'':'pos';
    const riskState = score>=65?'LOW RISK':score>=48?'MODERATE':score<=35?'HIGH RISK':'WATCH';
    const riskCls   = score>=65?'pos':score>=48?'':score<=35?'neg':'warn';
    const rsVsMkt   = score>=65?'OUTPERFORM':score>=50?'IN LINE':score>=38?'UNDERPERFORM':'LAGGING';
    const rsCls     = score>=65?'pos':score>=50?'':score>=38?'warn':'neg';
    const catalystState = (sl.includes('earnings beat')||sl.includes('upgrade')||sl.includes('hbm')||sl.includes('ai demand'))?'CATALYST PRESENT':
                          (sl.includes('downgrade')||sl.includes('earnings miss'))?'NEGATIVE EVENT':
                          (sl.includes('no verified')||sl.includes('limited catalyst'))?'NO CATALYST':'MONITORING';
    const catCls = catalystState==='CATALYST PRESENT'?'pos':catalystState==='NEGATIVE EVENT'?'neg':catalystState==='NO CATALYST'?'warn':'';

    // ── VOLUME CHARACTER ─────────────────────────────────
    const volChar = sl.includes('elevated volume')||sl.includes('high volume')?'HIGH VOLUME':
                    sl.includes('light volume')||sl.includes('low volume')?'LIGHT VOLUME':'AVG VOLUME';
    const volCharCls = volChar==='HIGH VOLUME'?'pos':volChar==='LIGHT VOLUME'?'warn':'';

    // ── TECHNICAL CHECKLIST (compact) ───────────────────
    const chks = [
      ['50DMA',   chg!==null?(chg>-8?'pass':'fail'):'na',   chg!==null?(chg>-8?'✓':'✗'):'—'],
      ['150DMA',  score>=55?'pass':score>=42?'warn':'fail',  score>=55?'✓':score>=42?'~':'✗'],
      ['200DMA',  score>=60?'pass':score>=45?'warn':'fail',  score>=60?'✓':score>=45?'~':'✗'],
      ['REL STR', score>=65?'pass':score>=48?'warn':'fail',  score>=65?'STR':score>=48?'NEU':'WK'],
      ['VOLUME',  sl.includes('elevated volume')?'pass':sl.includes('volume')?'warn':'na',
                  sl.includes('elevated volume')?'HIGH':sl.includes('volume')?'AVG':'—'],
      ['OVEREXT', sl.includes('overextended')||sl.includes('extended')?'fail':score>=78?'warn':'pass',
                  sl.includes('overextended')?'YES':score>=78?'WCH':'NO'],
      ['VOLAT',   chg!==null&&Math.abs(chg)>4?'warn':'pass', chg!==null?Math.abs(chg).toFixed(1)+'%':'—'],
      ['EARN',    sl.includes('earnings')||sl.includes(' q1 ')||sl.includes(' q2 ')||sl.includes(' q3 ')||sl.includes(' q4 ')?'warn':'pass',
                  sl.includes('earnings')?'NEAR':'—'],
    ];

    // ── CATALYST CHIPS ───────────────────────────────────
    const catalystChips = [
      [sl.includes('hbm'),                                         'HBM DEMAND',    'pos'],
      [sl.includes('ai demand')||sl.includes('ai-driven'),         'AI DEMAND',     'pos'],
      [sl.includes('earnings beat'),                               'EARN BEAT',     'pos'],
      [sl.includes('upgrade')&&!sl.includes('downgrade'),         'UPGRADE',       'pos'],
      [sl.includes('earnings miss'),                               'EARN MISS',     'neg'],
      [sl.includes('downgrade'),                                   'DOWNGRADE',     'neg'],
      [sl.includes('guidance cut'),                                'GUID CUT',      'neg'],
      [sl.includes('sector rotation'),                             'ROTATION',      'warn'],
      [sl.includes('elevated volume'),                             'HIGH VOL',      'info'],
      [sl.includes('profit-taking'),                               'PROFIT TAKE',   'warn'],
      [sl.includes('macro')||sl.includes('tariff')||sl.includes('rate'),  'MACRO',  'warn'],
      [sl.includes('no verified')||sl.includes('limited catalyst'),'NO CATALYST',   'muted'],
    ].filter(([c])=>c).slice(0,6).map(([,l,t])=>`<span class="ctag ${t}">${l}</span>`).join('');

    // ── SPARKLINE ────────────────────────────────────────
    const spark = (() => {
      const w=56,h=16;
      const pts=[50,50,score>=55?55:45,score];
      if(chg!==null) pts[2]=Math.max(5,Math.min(95,50+chg*1.5));
      const coords=pts.map((v,i)=>`${Math.round(i*(w/(pts.length-1)))},${Math.round(h-(v/100)*h)}`).join(' ');
      const col=sent==='positive'?'#00b870':sent==='negative'?'#d03348':'#3a5068';
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <polyline points="${coords}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${w}" cy="${Math.round(h-(score/100)*h)}" r="2" fill="${col}"/>

    })();

    // ── SESSION BAR ──────────────────────────────────────
    const sessionBar = chg!==null ? (() => {
      const today = new Date();
      const fd = d => {const dt=new Date(today);dt.setDate(dt.getDate()+d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});};
      const h = Math.min(20,Math.max(3,Math.abs(chg)*2.2));

    const memo = [
      keyEvent ? `<div class="memo-row"><span class="memo-tag">EVENT</span><span class="memo-val">${keyEvent}</span></div>` : '',
      (item.news||[]).filter(n=>n.startsWith('Primary')||n.startsWith('Secondary')).map(n=>`<div class="memo-row"><span class="memo-tag">${n.startsWith('Primary')?'PRIMARY':'SECONDARY'}</span><span class="memo-val">${n.replace(/^(Primary|Secondary):\s*/i,'')}</span></div>`).join(''),
    ].filter(Boolean).join('');

    const ticker = item.ticker;

    return `<div class="mse-card ${sent}">

      <!-- HEADER ROW -->
      <div class="mse-header">
        <div class="mse-id">
          <span class="mse-ticker">${ticker}</span>
          ${price?`<span class="mse-price">${price}</span>`:''}
          ${chg!==null?`<span class="mse-chg ${chgCls}">${chgStr}</span>`:''}
          ${spark ? `<span class="mse-spark">${spark}</span>` : ''}
        </div>
        <div class="mse-co">${item.company_name||''}</div>
        <div class="mse-badges">
          <span class="setup-pill ${sc}">${sg}</span>
          <span class="phase-pill ${phaseCls}">${phase}</span>
          <span class="sent-pill ${sent}">${sent==='positive'?'▲ BULL':sent==='negative'?'▼ BEAR':'● NEUT'}</span>
        </div>
      </div>

      <!-- MARKET STATE ROW — instant scan -->
      <div class="state-row">
        <div class="state-cell">
          <span class="state-lbl">RISK STATE</span>
          <span class="state-val ${riskCls}">${riskState}</span>
        </div>
        <div class="state-cell">
          <span class="state-lbl">TREND</span>
          <span class="state-val">${phase}</span>
        </div>
        <div class="state-cell">
          <span class="state-lbl">REL STR</span>
          <span class="state-val ${rsCls}">${rsVsMkt}</span>
        </div>
        <div class="state-cell">
          <span class="state-lbl">VOLATILITY</span>
          <span class="state-val ${volCls}">${volReg}</span>
        </div>
        <div class="state-cell">
          <span class="state-lbl">CATALYST</span>
          <span class="state-val ${catCls}">${catalystState}</span>
        </div>
        <div class="state-cell">
          <span class="state-lbl">VOLUME</span>
          <span class="state-val ${volCharCls}">${volChar}</span>
        </div>
      </div>

      <!-- SCORE + CHECKLIST ROW -->
      <div class="metrics-row">
        <!-- Score bars -->
        <div class="score-col">
          <div class="srow">
            <span class="s-lbl">SCORE</span>
            <div class="s-track"><div class="s-fill ${sent}" style="width:${score}%"></div></div>
            <span class="s-num">${score}</span>

            <span class="s-lbl">CONF</span>
            <div class="s-track"><div class="s-fill conf-${score>=70?'hi':score>=50?'md':'lo'}" style="width:${score>=70?88:score>=50?60:30}%"></div></div>
            <span class="s-num conf-${score>=70?'hi':score>=50?'md':'lo'}">${score>=70?'HIGH':score>=50?'MID':'LOW'}</span>
          </div>
          <div class="srow">
            <span class="s-lbl">BULL/BEAR</span>
            <div class="s-track bb"><div class="s-fill bull-f" style="width:${score}%"></div></div>

          </div>
          <div class="srow" style="margin-top:6px">
            <span class="s-lbl">RATING</span>
            <div class="s-track" style="background:transparent"></div>
            <span class="s-num rating-${ratingCls}" style="font-size:12px;font-weight:700">${rating.toUpperCase()} · PT $${pt}</span>
          </div>
        </div>
        <!-- Technical checklist -->
        <div class="chk-col">
          ${chks.map(([l,st,v])=>`<div class="chk"><div class="chk-dot ${st}"></div><span class="chk-l">${l}</span><span class="chk-v ${st}">${v}</span></div>`).join('')}
        </div>
        <!-- Sessions + Catalyst chips -->
        <div class="right-col">
          ${sessionBar?`<div class="session-bars">${sessionBar}</div>`:''}
          <div class="catalyst-chips">${catalystChips}</div>
        </div>
      </div>

      <!-- ACTIONABLE TAKE — always visible, compact -->
      ${actionable?`<div class="action-row">
        <span class="action-tag">▶ TAKE</span>
        <span class="action-body">${actionable.replace(/Rating:.*$/s,'').trim()}</span>
      </div>`:''}

      <!-- RESEARCH MEMO — collapsed -->
      <button class="memo-btn" onclick="
        const m=document.getElementById('memo-${ticker}');
        const open=m.style.display==='block';
        m.style.display=open?'none':'block';
        this.querySelector('.memo-btn-label').textContent=open?'SHOW RESEARCH MEMO ↓':'HIDE MEMO ↑';
      "><span class="memo-btn-label">SHOW RESEARCH MEMO ↓</span></button>
      <div class="memo-panel" id="memo-${ticker}" style="display:none">
        ${memo}
        <div class="dd-wrap">
          <button class="dd-btn" id="dd-btn-${ticker}" onclick="deepDive('${ticker}')">RUN DEEP DIVE ↓</button>
          <div id="dd-${ticker}" style="display:none">
            <div class="dd-lbl">Institutional Analysis</div>
            <div class="dd-body" id="dd-text-${ticker}"></div>
          </div>
        </div>
      </div>

    </div>`;
  }).join('');
}


function exportJSON() {
  if (!results.length) return;
  const blob = new Blob([JSON.stringify({ date: localStorage.getItem('pt_date'), results }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `portfolio_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

// ── runAnalysis ───────────────────────────────────────────────────────────────
let _analysisRunning = false;
async function runAnalysis() {
  if (_analysisRunning) { console.warn('[PT] runAnalysis: already running, ignoring duplicate call'); return; }
  _analysisRunning = true;
  if (!apiKey && !pplxKey) { _analysisRunning = false; showError('נא להכניס לפחות מפתח API אחד (Anthropic או Perplexity)'); return; }
  if (tickers.length === 0) { _analysisRunning = false; showError('נא להוסיף לפחות טיקר אחד'); return; }

  // HARD STATE RESET
  results = [];
  localStorage.removeItem('pt_results');
  localStorage.removeItem('pt_date');
  window._lastPplxRaw = null;
  window._lastStockData = null;
  if (window._fetchTimestamps) Object.keys(window._fetchTimestamps).forEach(k => delete window._fetchTimestamps[k]);
  document.querySelectorAll('[class*="deepdive-result"]').forEach(el => { el.style.display = 'none'; const txt = el.querySelector('[id^="dd-text-"]'); if (txt) txt.textContent = ''; });
  document.querySelectorAll('[id^="dd-btn-"]').forEach(btn => { btn.textContent = 'Deep Dive — ניתוח מוסדי מעמיק'; btn.disabled = false; });
  const resultsGrid = document.getElementById('cardsGrid');
  if (resultsGrid) resultsGrid.innerHTML = '';
  console.log('[PT] State reset complete — UI cleared');

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'מנתח...';
  document.getElementById('errorBox').style.display = 'none';
  if (document.getElementById('emptyState')) document.getElementById('emptyState').style.display = 'none';

  const today = new Date().toLocaleDateString('he-IL');
  const BATCH_SIZE = 5;
  const allResults = [];

  try {
    setProgress(5, 'מאתחל...');
    for (let i = 0; i < tickers.length; i += BATCH_SIZE) {
      const batch = tickers.slice(i, i + BATCH_SIZE);
      const pct = Math.round(10 + (i / tickers.length) * 80);
      setProgress(pct, `מנתח ${batch.join(', ')}...`);
      const batchResults = await analyzeChunk(batch, today);
      allResults.push(...batchResults);
      results = [...allResults];
      const dateStr = new Date().toLocaleString('he-IL');
      renderResults(allResults, dateStr);
    }

    setProgress(100, 'הניתוח הושלם!');
    const dateStr = new Date().toLocaleString('he-IL');

    const validResults = allResults.filter(r => {
      // Strict schema: must have ticker, numeric score, non-empty summary
      const ok = r &&
        typeof r.ticker === 'string' && r.ticker.length > 0 &&
        typeof r.sentiment_score === 'number' && r.sentiment_score >= 0 && r.sentiment_score <= 100 &&
        typeof r.summary === 'string' && r.summary.length > 50 &&
        ['positive','negative','neutral'].includes(r.sentiment) &&
        // Summary must not contain raw pipeline state
        !r.summary.includes('=== PERPLEXITY') &&
        !r.summary.includes('%%NEWS_CONTEXT') &&
        !r.summary.includes('__raw__');
      if (!ok) console.warn('[PT] REJECTED malformed result:', JSON.stringify(r).slice(0,120));
      return ok;
    });

    const seen = new Set();
    const dedupedResults = [...validResults].reverse().filter(r => {
      if (seen.has(r.ticker)) { console.warn('[PT] DEDUP: dropped stale result for', r.ticker); return false; }
      seen.add(r.ticker); return true;
    }).reverse();

    const runId = Date.now();
    const runTimestamp = new Date().toISOString();
    dedupedResults.forEach(r => { r._runId = runId; r._timestamp = runTimestamp; });

    console.log(`[PT] Saving ${dedupedResults.length} validated results (${allResults.length - dedupedResults.length} dropped)`);
    localStorage.setItem('pt_results', JSON.stringify(dedupedResults));
    localStorage.setItem('pt_date', dateStr);
    results = dedupedResults;
    try {
      renderResults(dedupedResults, dateStr);
    } catch(renderErr) {
      console.error('[PT] renderResults failed:', renderErr.message);
      showError('שגיאה בהצגת התוצאות: ' + renderErr.message);
    }

  } catch (err) {
    hideProgress();
    showError(err.message || 'שגיאה לא ידועה');
    btn.disabled = false;
    btn.textContent = 'הפעל ניתוח יומי';
    document.getElementById('resultsSection').style.display = results.length ? 'block' : 'none';
  } finally {
    _analysisRunning = false;
    btn.disabled = false;
    btn.textContent = 'הפעל ניתוח יומי';
    hideProgress();
  }
}

// ── init ──────────────────────────────────────────────────────────────────────
function init() {
  if (apiKey) { document.getElementById('apiKey').value = apiKey; document.getElementById('keyStatus').textContent = '✓ שמור'; document.getElementById('keyStatus').style.color = 'var(--green)'; }
  else { document.getElementById('keyStatus').textContent = '⚠ נדרש — הכנס key ולחץ שמור'; document.getElementById('keyStatus').style.color = 'orange'; }
  if (pplxKey) { document.getElementById('pplxKey').value = pplxKey; document.getElementById('pplxKeyStatus').textContent = '✓ שמור'; document.getElementById('pplxKeyStatus').style.color = 'var(--green)'; }
  if (avKey) { document.getElementById('avKey').value = avKey; document.getElementById('avKeyStatus').textContent = '✓ שמור'; document.getElementById('avKeyStatus').style.color = 'var(--green)'; }
  renderChips();
  if (results.length) { const dateStr = localStorage.getItem('pt_date') || ''; renderResults(results, dateStr); }
}

init();
// ─────────────────────────────────────────────────────────────────────────────



</script>
