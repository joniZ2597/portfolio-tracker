<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PT // PORTFOLIO TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ─── TOKENS ─────────────────────────────── */
:root{
  --bg:#050709;--card:#0c0f16;--card2:#0e1219;
  --border:#141b24;--border2:#1c2636;
  --accent:#00aed4;--green:#00a060;--red:#c83344;
  --yellow:#c48a10;--orange:#c05820;--purple:#6a4eb0;
  --muted:#384858;--muted2:#1e2a3a;
  --text:#b8ccd8;--text2:#6a8099;--text3:#445060;
  --mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}

/* ─── CHROME ──────────────────────────────── */
.wrap{max-width:1360px;margin:0 auto;padding:12px 16px}

.topbar{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:10px}
.brand{display:flex;align-items:center;gap:8px}
.brand-mark{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--accent);
  background:rgba(0,174,212,.07);border:1px solid rgba(0,174,212,.18);
  border-radius:2px;padding:3px 8px;letter-spacing:2px}
.brand-name{font-family:var(--mono);font-size:12px;letter-spacing:.5px}
.brand-sub{font-size:10px;color:var(--muted);margin-top:1px}
.regime-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.rpill{font-family:var(--mono);font-size:8px;font-weight:600;padding:2px 7px;
  border-radius:2px;border:1px solid;letter-spacing:.5px;white-space:nowrap}
.rpill.on {color:var(--green);border-color:rgba(0,160,96,.25);background:rgba(0,160,96,.07)}
.rpill.off{color:var(--red);border-color:rgba(200,51,68,.25);background:rgba(200,51,68,.07)}
.rpill.mix{color:var(--yellow);border-color:rgba(196,138,16,.25);background:rgba(196,138,16,.07)}
.rpill.inf{color:var(--muted);border-color:var(--border2)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

.config-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.cfg-row{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:6px 10px;display:flex;align-items:center;gap:6px}
.cfg-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;min-width:50px;white-space:nowrap}
.cfg-row input{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:9px;flex:1;min-width:0}
.cfg-row input::placeholder{color:var(--muted2)}
.btn-cfg{font-family:var(--mono);font-size:8px;color:var(--accent);background:none;border:1px solid rgba(0,174,212,.18);border-radius:2px;padding:2px 7px;cursor:pointer}
.btn-cfg:hover{background:rgba(0,174,212,.07)}
.cfg-st{font-family:var(--mono);font-size:8px}

.wl-bar{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wl-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.wl-inp{background:var(--bg);border:1px solid var(--border2);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:11px;padding:4px 8px;outline:none;width:86px;text-transform:uppercase}
.wl-inp:focus{border-color:var(--accent)}
.btn-add{font-family:var(--mono);font-size:9px;background:rgba(0,174,212,.09);border:1px solid rgba(0,174,212,.2);color:var(--accent);border-radius:2px;padding:4px 10px;cursor:pointer}
.btn-ghost{font-family:var(--mono);font-size:9px;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:2px;padding:4px 8px;cursor:pointer}
.btn-ghost:hover{color:var(--text2)}
.chips-wrap{display:flex;flex-wrap:wrap;gap:3px;flex:1}
.chip{font-family:var(--mono);font-size:9px;background:var(--muted2);border-radius:2px;padding:2px 6px;display:flex;align-items:center;gap:3px}
.chip-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;line-height:1}
.chip-x:hover{color:var(--red)}

.run-bar{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.btn-run{font-family:var(--mono);font-size:11px;font-weight:600;background:var(--accent);color:#000;border:none;border-radius:2px;padding:9px 22px;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase}
.btn-run:hover{opacity:.86}.btn-run:disabled{opacity:.28;cursor:not-allowed}
.prog-wrap{height:2px;background:var(--border);margin-bottom:8px;display:none}
.prog-bar{height:100%;background:var(--accent);width:0;transition:width .4s}
.error-box{display:none;font-family:var(--mono);font-size:9px;color:var(--red);background:rgba(200,51,68,.06);border:1px solid rgba(200,51,68,.16);border-radius:2px;padding:6px 10px;margin-bottom:8px}
.debug-panel{display:none!important}

.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.res-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.res-date{font-family:var(--mono);font-size:9px;color:var(--accent)}
.btn-exp{font-family:var(--mono);font-size:8px;color:var(--muted);background:none;border:1px solid var(--border2);border-radius:2px;padding:3px 8px;cursor:pointer}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(540px,1fr));gap:10px}
@media(max-width:580px){.cards-grid{grid-template-columns:1fr}}

/* ════════════════════════════════════════════
   RESEARCH CARD — two-layer architecture
════════════════════════════════════════════ */
.rcard{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.rcard.positive{border-left:3px solid var(--green)}
.rcard.negative{border-left:3px solid var(--red)}
.rcard.neutral {border-left:3px solid var(--muted)}

/* ── LAYER 1A: IDENTITY ── */
.card-identity{display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px 8px;border-bottom:1px solid var(--border)}
.identity-left{flex:1;min-width:0}
.identity-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.ticker-sym{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:.5px}
.price-now{font-family:var(--mono);font-size:13px;color:var(--text2)}
.chg-pct{font-family:var(--mono);font-size:12px;font-weight:600}
.chg-pct.pos{color:var(--green)}.chg-pct.neg{color:var(--red)}
.company-name{font-size:11px;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.identity-spark{flex-shrink:0;padding-top:3px;opacity:.85}
.identity-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}

.sent-badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:2px;white-space:nowrap}
.sent-badge.positive{background:rgba(0,160,96,.1);color:var(--green);border:1px solid rgba(0,160,96,.22)}
.sent-badge.negative{background:rgba(200,51,68,.1);color:var(--red);border:1px solid rgba(200,51,68,.22)}
.sent-badge.neutral {background:var(--muted2);color:var(--text2);border:1px solid var(--border2)}

.phase-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 6px;border-radius:2px;border:1px solid;white-space:nowrap}
.phase-badge.accumulation{color:#4ab8d8;border-color:rgba(74,184,216,.22);background:rgba(74,184,216,.07)}
.phase-badge.continuation{color:var(--green);border-color:rgba(0,160,96,.22);background:rgba(0,160,96,.07)}
.phase-badge.base        {color:var(--yellow);border-color:rgba(196,138,16,.22);background:rgba(196,138,16,.07)}
.phase-badge.distribution{color:var(--red);border-color:rgba(200,51,68,.22);background:rgba(200,51,68,.07)}
.phase-badge.correction  {color:var(--orange);border-color:rgba(192,88,32,.22);background:rgba(192,88,32,.07)}
.phase-badge.extended    {color:var(--purple);border-color:rgba(106,78,176,.22);background:rgba(106,78,176,.07)}

/* ── LAYER 1B: SETUP + SCORE BAND ── */
.score-band{display:grid;grid-template-columns:auto 1fr auto;
  gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:start}

.setup-block{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px}
.setup-grade{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}
.setup-grade.ap   {color:#00d468}.setup-grade.a{color:var(--green)}
.setup-grade.b    {color:var(--yellow)}.setup-grade.c{color:var(--orange)}.setup-grade.avoid{color:var(--red)}
.setup-label{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

.score-block{display:flex;flex-direction:column;gap:5px}
.sbar-row{display:flex;align-items:center;gap:7px}
.sbar-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;width:36px}
.sbar-track{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;position:relative}
.sbar-fill{height:100%;border-radius:2px}
.sbar-fill.positive{background:var(--green)}.sbar-fill.negative{background:var(--red)}.sbar-fill.neutral{background:var(--muted)}
.sbar-fill.conf-hi{background:var(--green)}.sbar-fill.conf-md{background:var(--yellow)}.sbar-fill.conf-lo{background:var(--muted)}
.bull-bear-track{position:relative}
.sbar-fill.bull-side{background:var(--green);position:absolute;left:0;top:0;height:100%;border-radius:2px}
.sbar-num{font-family:var(--mono);font-size:9px;color:var(--text2);min-width:36px;text-align:right}
.conf-badge-sm{font-family:var(--mono);font-size:8px;min-width:36px;text-align:right}
.conf-badge-sm.hi{color:var(--green)}.conf-badge-sm.md{color:var(--yellow)}.conf-badge-sm.lo{color:var(--muted)}

.mkt-quick{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.mq-cell{display:flex;flex-direction:column;gap:1px}
.mq-lbl{font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.mq-val{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text)}
.mq-val.pos{color:var(--green)}.mq-val.neg{color:var(--red)}.mq-val.warn{color:var(--yellow)}
.mq-val.rating-buy{color:var(--green)}.mq-val.rating-sell{color:var(--red)}.mq-val.rating-hold{color:var(--muted)}

/* ── LAYER 2: TECHNICAL + SIGNALS ── */
.signal-band{display:grid;grid-template-columns:1fr 1fr;
  gap:0;border-bottom:1px solid var(--border)}

.checklist-col{padding:10px 14px;border-right:1px solid var(--border)}
.chips-col{padding:10px 14px}
.band-label{font-family:var(--mono);font-size:8px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}

.checklist{display:flex;flex-direction:column;gap:3px}
.chk-row{display:flex;align-items:center;gap:6px;min-height:18px}
.chk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chk-dot.pass{background:var(--green)}.chk-dot.fail{background:var(--red)}
.chk-dot.warn{background:var(--yellow)}.chk-dot.na{background:var(--muted2)}
.chk-label{font-family:var(--mono);font-size:9px;color:var(--text2);flex:1}
.chk-val{font-family:var(--mono);font-size:8px;font-weight:600;text-align:right;min-width:30px}
.chk-val.pass{color:var(--green)}.chk-val.fail{color:var(--red)}
.chk-val.warn{color:var(--yellow)}.chk-val.na{color:var(--muted)}

.chips-wrap-card{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.schip{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:2px;
  border:1px solid;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.schip.crit{background:rgba(200,51,68,.06);border-color:rgba(200,51,68,.18);color:var(--red)}
.schip.norm{background:rgba(0,174,212,.05);border-color:rgba(0,174,212,.16);color:var(--accent)}
.schip.warn{background:rgba(196,138,16,.06);border-color:rgba(196,138,16,.18);color:var(--yellow)}
.schip.good{background:rgba(0,160,96,.06);border-color:rgba(0,160,96,.18);color:var(--green)}

/* Timeline */
.tl-items{display:flex;gap:6px;align-items:flex-end}
.tl-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.tl-date{font-family:var(--mono);font-size:7px;color:var(--muted)}
.tl-bar-wrap{height:22px;display:flex;align-items:flex-end}
.tl-bar{width:4px;border-radius:1px;min-height:2px}
.tl-bar.up{background:var(--green)}.tl-bar.dn{background:var(--red)}.tl-bar.fl{background:var(--muted2)}
.tl-pct{font-family:var(--mono);font-size:7px}
.tl-pct.up{color:var(--green)}.tl-pct.dn{color:var(--red)}.tl-pct.fl{color:var(--muted)}

/* ── LAYER 3: ACTIONABLE TAKE ── */
.action-band{padding:11px 14px;border-bottom:1px solid var(--border);
  border-right:3px solid var(--accent);background:rgba(0,174,212,.03)}
.action-tag{font-family:var(--mono);font-size:8px;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.action-body{font-size:13px;color:var(--text);font-weight:500;line-height:1.6}

/* ── LAYER 4: RESEARCH MEMO TOGGLE ── */
.memo-toggle{width:100%;padding:8px 14px;background:none;border:none;
  border-top:1px solid var(--border);color:var(--muted);
  font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;
  cursor:pointer;text-align:center;display:flex;align-items:center;gap:8px;
  transition:color .15s}
.memo-toggle::before,.memo-toggle::after{content:'';flex:1;height:1px;background:var(--border2)}
.memo-toggle:hover{color:var(--text2)}

.research-memo{border-top:1px solid var(--border);background:rgba(0,0,0,.15)}
.memo-section{padding:10px 14px;border-bottom:1px solid var(--border)}
.memo-label{font-family:var(--mono);font-size:8px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.memo-body{font-size:12px;color:var(--text);line-height:1.7}
.memo-body.memo-secondary{font-size:12px;color:var(--text2);line-height:1.65}
.memo-section.memo-action{background:rgba(0,174,212,.025);border-right:2px solid var(--accent)}
.memo-section.memo-action .memo-label{color:var(--accent)}
.memo-section.memo-action .memo-body{font-size:13px;color:var(--text);font-weight:500}

.drv{display:flex;gap:7px;align-items:flex-start;margin-bottom:3px}
.drv-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;white-space:nowrap;padding-top:2px;min-width:52px}
.drv-txt{font-size:12px;color:var(--text2);line-height:1.5}

.dd-section{padding:10px 14px}
.btn-dd-inner{width:100%;padding:8px;background:rgba(0,174,212,.05);border:1px solid rgba(0,174,212,.15);
  border-radius:2px;color:var(--accent);font-family:var(--mono);font-size:9px;
  text-transform:uppercase;letter-spacing:1px;cursor:pointer}
.btn-dd-inner:hover{background:rgba(0,174,212,.1)}
.dd-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px}
.dd-body{font-size:12px;color:var(--text2);line-height:1.65}

/* EMPTY + MISC */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-family:var(--mono);font-size:22px;margin-bottom:12px;opacity:.28}
.empty-title{font-family:var(--mono);font-size:11px;margin-bottom:5px}
.empty-desc{font-size:11px;color:var(--muted2);line-height:1.6}
#progressLabel{font-family:var(--mono);font-size:9px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">PT</div>
      <div>
        <div class="brand-name">PORTFOLIO_TERMINAL</div>
        <div class="brand-sub">Institutional Decision Dashboard</div>
      </div>
    </div>
    <div class="regime-bar" id="regimeBar">
      <div class="live-dot"></div>
      <span class="rpill inf" id="lastUpdated">READY</span>
    </div>
  </div>

  <div class="config-strip">
    <div class="cfg-row">
      <span class="cfg-lbl">ANTHROPIC</span>
      <input type="password" id="apiKey" placeholder="sk-ant-..."/>
      <button class="btn-cfg" onclick="saveKey()">SAVE</button>
      <span class="cfg-st" id="keyStatus"></span>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl">PERPLEXITY</span>
      <input type="password" id="pplxKey" placeholder="pplx-..."/>
      <button class="btn-cfg" onclick="savePplxKey()">SAVE</button>
      <span class="cfg-st" id="pplxKeyStatus"></span>
    </div>
    <div class="cfg-row">
      <span class="cfg-lbl">ALPHA VAL</span>
      <input type="password" id="avKey" placeholder="AV key..."/>
      <button class="btn-cfg" onclick="saveAvKey()">SAVE</button>
      <span class="cfg-st" id="avKeyStatus"></span>
    </div>
  </div>

  <div class="wl-bar">
    <span class="wl-lbl">WATCHLIST</span>
    <div style="display:flex;align-items:center;gap:5px">
      <input class="wl-inp" type="text" id="tickerInput" placeholder="AAPL" maxlength="10"
        onkeydown="if(event.key==='Enter') addTicker()"/>
      <button class="btn-add" onclick="addTicker()">+ ADD</button>
      <button class="btn-ghost" onclick="loadSample()">↺ Portfolio</button>
      <button class="btn-ghost" onclick="clearAll()">Clear</button>
    </div>
    <div class="chips-wrap" id="tickerChips"></div>
  </div>

  <div class="run-bar">
    <button class="btn-run" id="runBtn" onclick="runAnalysis()">RUN ANALYSIS</button>
    <span id="progressLabel"></span>
  </div>

  <div class="debug-panel" id="debugPanel"><div id="debugContent"></div></div>
  <div class="error-box" id="errorBox"></div>
  <div class="prog-wrap" id="progressWrap"><div class="prog-bar" id="progressBar"></div></div>

  <div id="resultsSection" style="display:none">
    <div class="results-hdr">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="res-label">RESEARCH OUTPUT</span>
        <span class="res-date" id="resultsDate"></span>
      </div>
      <button class="btn-exp" onclick="exportJSON()">EXPORT JSON</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">[ ]</div>
    <div class="empty-title">ADD TICKERS → RUN ANALYSIS</div>
    <div class="empty-desc">Dashboard layer: setup · score · signals · actionable<br>Research layer: memo · drivers · deep dive (on demand)</div>
  </div>

</div>
<script>


const SAMPLE_TICKERS = ['AAPL','NVDA','MSFT','TSLA','GOOGL','META','AMZN'];
const MY_PORTFOLIO = ['FROG','CRWD','XLE','QQQ','SPY','ROK','KRE','NVDA','ONDS','VRT','MRNA','AA','MDT','CAH','ON','SOXX','TAN','CIBR','FLNG','MU','NFLX','ITA','IGV'];
let tickers = JSON.parse(localStorage.getItem('pt_tickers') || 'null') || [...MY_PORTFOLIO];
let results = JSON.parse(localStorage.getItem('pt_results') || '[]');
let apiKey = localStorage.getItem('pt_apikey') || '';
let pplxKey = localStorage.getItem('pt_pplxkey') || '';

// ────────────────────────────────────── STOCK DATA LAYER ──────────────────────────────────────

const YAHOO_PROXY = 'https://api.allorigins.win/raw?url=';
const AV_BASE     = 'https://www.alphavantage.co/query';

function saveAvKey() {
  avKey = document.getElementById('avKey').value.trim();
  localStorage.setItem('pt_avkey', avKey);
  document.getElementById('avKeyStatus').textContent = '✓ שמור';
  document.getElementById('avKeyStatus').style.color = 'var(--green)';
}

// Validate a stock data object → returns true if all required fields present
function isValidStockData(d) {
  return d &&
    typeof d.price === 'number' && d.price > 0 &&
    typeof d.change_percent === 'number' &&
    typeof d.high === 'number' &&
    typeof d.low === 'number' &&
    d.timestamp;
}

// Fetch from Yahoo Finance via proxy
async function fetchYahoo(symbol) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  const proxied = YAHOO_PROXY + encodeURIComponent(url);
  const res = await fetch(proxied, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('Yahoo HTTP ' + res.status);
  const json = await res.json();
  const meta = json?.chart?.result?.[0]?.meta;
  if (!meta) throw new Error('Yahoo: no meta for ' + symbol);
  return {
    symbol:         symbol,
    price:          parseFloat(meta.regularMarketPrice),
    change_percent: meta.previousClose ? parseFloat(((meta.regularMarketPrice - meta.previousClose) / meta.previousClose * 100).toFixed(2)) : 0,
    high:           parseFloat(meta.regularMarketDayHigh),
    low:            parseFloat(meta.regularMarketDayLow),
    open:           parseFloat(meta.regularMarketOpen),
    previous_close: parseFloat(meta.previousClose),
    volume:         parseInt(meta.regularMarketVolume),
    timestamp:      new Date(meta.regularMarketTime * 1000).toISOString(),
    source:         'yahoo'
  };
}

// Fetch from Alpha Vantage using TIME_SERIES_INTRADAY (real intraday high/low)
async function fetchAlphaVantage(symbol) {
  if (!avKey) throw new Error('Alpha Vantage key missing');

  // Step 1: get previous close via GLOBAL_QUOTE
  const gqUrl = `${AV_BASE}?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${avKey}`;
  const gqRes = await fetch(gqUrl, { signal: AbortSignal.timeout(8000) });
  if (!gqRes.ok) throw new Error('AV GQ HTTP ' + gqRes.status);
  const gqJson = await gqRes.json();
  const q = gqJson?.['Global Quote'];
  if (!q || !q['05. price']) throw new Error('AV: no data for ' + symbol);

  const price          = parseFloat(q['05. price']);
  const previous_close = parseFloat(q['08. previous close']);
  const change_percent = parseFloat(q['10. change percent'].replace('%', ''));
  const open           = parseFloat(q['02. open']);
  const volume         = parseInt(q['06. volume']);

  // Step 2: get real intraday high/low from TIME_SERIES_INTRADAY (15min)
  let high = parseFloat(q['03. high']);
  let low  = parseFloat(q['04. low']);
  try {
    const tsUrl = `${AV_BASE}?function=TIME_SERIES_INTRADAY&symbol=${symbol}&interval=15min&outputsize=compact&apikey=${avKey}`;
    const tsRes = await fetch(tsUrl, { signal: AbortSignal.timeout(8000) });
    if (tsRes.ok) {
      const tsJson = await tsRes.json();
      const series = tsJson?.['Time Series (15min)'];
      if (series) {
        const candles = Object.values(series);
        // Calculate true intraday high/low from all 15min candles today
        const highs = candles.map(c => parseFloat(c['2. high'])).filter(v => !isNaN(v));
        const lows  = candles.map(c => parseFloat(c['3. low'])).filter(v => !isNaN(v));
        if (highs.length) high = Math.max(...highs);
        if (lows.length)  low  = Math.min(...lows);
      }
    }
  } catch(e) {
    // Keep GLOBAL_QUOTE high/low as fallback → already set above
    console.warn('AV intraday fallback for ' + symbol + ':', e.message);
  }

  return {
    symbol, price, change_percent, high, low,
    open, previous_close, volume,
    timestamp: new Date().toISOString(),
    source: 'alphavantage'
  };
}

// Main: fetch with Yahoo → fallback Alpha Vantage
async function fetchStockData(symbol) {
  try {
    const data = await fetchYahoo(symbol);
    if (isValidStockData(data)) return data;
    throw new Error('Yahoo data invalid');
  } catch(e) {
    console.warn(`Yahoo failed for ${symbol}: ${e.message} → trying Alpha Vantage`);
    try {
      const data = await fetchAlphaVantage(symbol);
      if (isValidStockData(data)) return data;
      throw new Error('AV data invalid');
    } catch(e2) {
      console.warn(`Alpha Vantage failed for ${symbol}: ${e2.message}`);
      return null; // graceful null → AI will handle without real data
    }
  }
}

// Fetch data for a full batch in parallel
async function fetchBatchStockData(symbols) {
  const results = await Promise.allSettled(symbols.map(s => fetchStockData(s)));
  const map = {};
  results.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value) map[symbols[i]] = r.value;
  });
  return map; // { AAPL: {...}, NVDA: {...}, ... }
}

  const lines = Object.values(stockMap).map(d => {

      `${d.symbol} [source: ${d.source}]\n` +

  });
  return '\n=== LIVE MARKET DATA (verified, use exactly as provided) ===\n' + lines.join('\n\n') + '\n=== END MARKET DATA ===';

// ── Parse Perplexity markdown/text into structured object ───────────────────
function parsePerplexityContext(raw) {
  const result = {};
  if (!raw || raw.length < 10) return result;
  const lines = raw.split('\n');
  let currentTicker = null, currentLines = [];

  const flushTicker = () => {
    if (!currentTicker || !currentLines.length) return;
    const block = currentLines.join('\n');
    const analystActions = [];
    const ptRe = /\b(Goldman|GS|Morgan Stanley|MS|JPMorgan|JPM|UBS|BofA|Bank of America|CFRA|Citi|Barclays|Jefferies|Wedbush|Needham|KeyBanc|Wells Fargo|Deutsche|Raymond James|Piper Sandler)[^\n]*?\$([0-9,]+)/gi;
    let ptMatch;
    while ((ptMatch = ptRe.exec(block)) !== null) {
      const target = parseFloat(ptMatch[2].replace(',', ''));
      if (target > 0 && target < 5000) analystActions.push({ bank: ptMatch[1], target, raw: ptMatch[0].slice(0, 80) });
    }
    const bullish = [], bearish = [];
    currentLines.forEach(l => {
      const ll = l.toLowerCase();
      if (ll.includes('bullish') || ll.includes('beat') || ll.includes('strong demand') || ll.includes('ai demand') || ll.includes('hbm') || ll.includes('upside')) {
        const clean = l.replace(/^[-*•#>\s]+/, '').trim();
        if (clean.length > 10) bullish.push(clean.slice(0, 100));
      }
      if (ll.includes('bearish') || ll.includes('risk') || ll.includes('pressure') || ll.includes('declining') || ll.includes('downside')) {
        const clean = l.replace(/^[-*•#>\s]+/, '').trim();
        if (clean.length > 10) bearish.push(clean.slice(0, 100));
      }
    });
    // Extract revision direction
    const revLine = currentLines.find(l => l.startsWith('REVISION_DIRECTION:'));
    const revDir = revLine ? revLine.replace('REVISION_DIRECTION:', '').trim() : 'unknown';
    const recLine = currentLines.find(l => l.startsWith('REVISION_RECENCY:'));
    const revRecency = recLine ? recLine.replace('REVISION_RECENCY:', '').trim() : 'unknown';
    const freshLine = currentLines.find(l => l.startsWith('DATA_FRESHNESS:'));
    const dataFreshness = freshLine ? freshLine.replace('DATA_FRESHNESS:', '').trim() : 'unknown';
    const earnLine = currentLines.find(l => l.startsWith('EARNINGS:'));
    const earnings = earnLine ? earnLine.replace('EARNINGS:', '').trim() : 'NONE';

    result[currentTicker] = {
      analystActions: analystActions.slice(0, 5),
      bullishCatalysts: bullish.slice(0, 4),
      bearishCatalysts: bearish.slice(0, 4),
      macroDrivers: [], institutionalFlows: [], risks: bearish.slice(0, 3),
      revisionDirection: revDir,
      revisionRecency: revRecency,
      dataFreshness,
      earnings
    };
    console.log(`[PT] Parsed ${currentTicker}: ${analystActions.length} analyst actions, ${bullish.length} bullish`);
    if (analystActions.length) console.log('[PT] Analyst actions:', JSON.stringify(analystActions));
  };

  for (const line of lines) {
    const tickerMatch = line.match(/^(?:TICKER:|##|\*\*)\s*([A-Z]{1,6})(?:\b|\*\*)/);
    if (tickerMatch) { flushTicker(); currentTicker = tickerMatch[1]; currentLines = []; }
    else if (currentTicker) currentLines.push(line);
  }
  flushTicker();

  if (Object.keys(result).length === 0 && raw.length > 50) {
    console.warn('[PT] No ticker headers found, using full text as context');
    result['__raw__'] = { rawText: raw, analystActions: [], bullishCatalysts: [], bearishCatalysts: [], macroDrivers: [], risks: [] };
    const ptRe2 = /\b(Goldman|GS|Morgan Stanley|UBS|BofA|CFRA|Citi|Barclays|Jefferies|Wedbush)[^\n]*?\$([0-9,]+)/gi;
    let m2;
    while ((m2 = ptRe2.exec(raw)) !== null) {
      const t = parseFloat(m2[2].replace(',', ''));
      if (t > 0 && t < 5000) result['__raw__'].analystActions.push({ bank: m2[1], target: t, raw: m2[0].slice(0, 80) });
    }
  }
  return result;
}

function formatNewsContext(pplxData, symbol) {
  const d = pplxData[symbol] || pplxData['__raw__'];
  if (!d) return `No research data for ${symbol}.`;
  const lines = [];
  // Analyst actions with freshness context
  if (d.analystActions?.length) {
    const ptStr = d.analystActions.map(a => `${a.bank} PT $${a.target}`).join(' | ');
    const freshTag = d.dataFreshness && d.dataFreshness !== 'unknown' ? ` [data: ${d.dataFreshness}]` : '';
    lines.push('ANALYST ACTIONS: ' + ptStr + freshTag);
  } else {
    lines.push('ANALYST ACTIONS: No verified analyst PTs in current data');
  }
  // Revision direction — critical for weighting
  if (d.revisionDirection && d.revisionDirection !== 'unknown' && d.revisionDirection !== 'NONE') {
    lines.push('REVISION DIRECTION: ' + d.revisionDirection + (d.revisionRecency !== 'unknown' ? ' (most recent: ' + d.revisionRecency + ')' : ''));
  }
  if (d.earnings && d.earnings !== 'NONE') lines.push('EARNINGS: ' + d.earnings);
  if (d.bullishCatalysts?.length) lines.push('BULLISH: ' + d.bullishCatalysts.join(' | '));
  if (d.bearishCatalysts?.length) lines.push('BEARISH: ' + d.bearishCatalysts.join(' | '));
  if (d.macroDrivers?.length)     lines.push('MACRO: ' + d.macroDrivers.join(' | '));
  if (d.risks?.length)            lines.push('RISKS: ' + d.risks.join(' | '));
  if (d.rawText)                  lines.push('RAW CONTEXT: ' + d.rawText.slice(0, 400));
  return lines.length ? lines.join('\n') : `No specific catalysts found for ${symbol}.`;
}

// ── Stale data detection ─────────────────────────────────────────────────────
const _fetchTimestamps = {};
function isStale(symbol, maxAgeMs = 5 * 60 * 1000) {
  const ts = _fetchTimestamps[symbol];
  if (!ts) return false;
  const age = Date.now() - ts;
  if (age > maxAgeMs) { console.warn(`[PT] STALE: ${symbol} is ${Math.round(age/1000)}s old`); return true; }
  return false;
}

// ── JSON repair ──────────────────────────────────────────────────────────────
function repairJSON(str) {
  str = str.replace(/,\s*([\]}])/g, '$1');
  let opens = 0, inStr = false, escape = false;
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (escape) { escape = false; continue; }
    if (c === '\\' && inStr) { escape = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{' || c === '[') opens++;
    if (c === '}' || c === ']') opens--;
  }
  const lastComplete = str.lastIndexOf('}]');
  if (opens > 0 && lastComplete > 0) str = str.slice(0, lastComplete + 2) + '}';
  return str;
}

function parseJSON(raw) {
  let clean = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const start = clean.indexOf('{');
  const end   = clean.lastIndexOf('}');
  if (start === -1) { console.warn('[PT] parseJSON: no { found'); return { results: [] }; }
  let jsonStr = end > start ? clean.slice(start, end + 1) : clean.slice(start);
  try { return JSON.parse(jsonStr); } catch(e1) {}
  try { return JSON.parse(repairJSON(jsonStr)); } catch(e2) {}
  console.warn('[PT] parseJSON: falling back to per-ticker extraction');
  const items = [];
  const tickerRe = /\{[^{}]*"ticker"\s*:\s*"([^"]+)"[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/g;
  let m;
  while ((m = tickerRe.exec(jsonStr)) !== null) {
    try { const obj = JSON.parse(m[0].replace(/,\s*$/, '')); if (obj.ticker) items.push(obj); } catch(e3) {}
  }
  console.log('[PT] parseJSON: extracted', items.length, 'items via fallback');
  return { results: items };
}

  } else if (fullResponse.startsWith('[')) {
    fullResponse = '{"results":' + fullResponse + '}';
  } else {
    fullResponse = '{"results":[{' + fullResponse + ']}';
  }
  console.log('[PT] Anthropic response OK, length:', fullResponse.length);
  console.log('[PT] Response first chars:', fullResponse.slice(0, 60));
  return fullResponse;
}

// ── Perplexity-only analysis ─────────────────────────────────────────────────
async function fetchPerplexityAnalysis(batch, today, stockContext = '') {
  const prompt = `You are a high-conviction hedge fund analyst. Decisive. Data-driven.
${stockContext ? 'VERIFIED PRICE DATA (use ONLY these numbers):\n' + stockContext + '\n' : ''}
For each ticker: ${batch.join(',')} write one institutional paragraph.
Structure: Key Event → Root Cause → Price Context → Bull vs Bear → Actionable Take
End: "Rating: Buy/Neutral/Sell | PT: $X | Do not chase strength"
Output STRICT JSON only — no backticks:
{"results":[{"ticker":"X","company_name":"Name","sentiment":"positive/negative/neutral","sentiment_score":0-100,"summary":"paragraph","alerts":[{"type":"critical/normal","text":"text"}],"news":["catalyst 1","catalyst 2"]}]}`;

  const response = await fetch('https://api.perplexity.ai/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${pplxKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'sonar-pro', messages: [{ role: 'user', content: prompt }], max_tokens: 1500 })
  });
  if (!response.ok) { const err = await response.json(); throw new Error('Perplexity: ' + (err.error?.message || 'API error')); }
  const data = await response.json();
  return data.choices[0].message.content.trim();
}

// ── Orchestration layer ──────────────────────────────────────────────────────
function orchestrate(claudeResults, pplxData, stockData) {
  return claudeResults.map(item => {
    const sym = item.ticker;
    const mkt  = stockData?.[sym];
    const pplx = pplxData?.[sym] || pplxData?.['__raw__'];

    if (mkt) { item._verifiedPrice = mkt.price; item._verifiedChangePct = mkt.change_percent; item._dataSource = mkt.source; }

    if (pplx?.analystActions?.length) {
      const ptMentioned = pplx.analystActions.some(a => item.summary?.includes(a.bank) || item.summary?.includes('$' + a.target));
      if (!ptMentioned) {
        item.alerts = item.alerts || [];
        pplx.analystActions.forEach(a => {
          item.alerts.push({ type: 'critical', text: `${a.bank} price target $${a.target} — verify if recent` });
        });
      }
    }

    if (item.alerts?.length) {
      const seen = new Set();
      item.alerts = item.alerts.filter(a => { const key = (a.text||'').slice(0,50); if (seen.has(key)) return false; seen.add(key); return true; });
    }

    const chg = mkt?.change_percent ?? 0;
    if (chg < -5 && item.sentiment_score > 60) { console.warn(`[PT] Orchestrate: score override ${sym} down ${chg}%`); item.sentiment_score = Math.min(item.sentiment_score, 45); item.sentiment = 'negative'; }
    if (chg > 5  && item.sentiment_score < 40) { console.warn(`[PT] Orchestrate: score override ${sym} up ${chg}%`);   item.sentiment_score = Math.max(item.sentiment_score, 55); item.sentiment = 'positive'; }

    item._orchestrated = true;
    item._orchestratedAt = new Date().toISOString();
    return item;
  });
}

// ── Score consistency enforcement ────────────────────────────────────────────
function enforceScoreConsistency(results, newsContext) {
  const tierOneBullish = ['raised pt', 'raised price target', 'pt hike', 'upgrade', 'earnings beat', 'revenue beat', 'buy rating initiated'];
  const tierOneBearish = ['downgrade', 'cut pt', 'sell rating', 'missed earnings', 'guidance cut'];
  const ctxLower = (newsContext || '').toLowerCase();
  const bullishCount = tierOneBullish.filter(s => ctxLower.includes(s)).length;
  const bearishCount = tierOneBearish.filter(s => ctxLower.includes(s)).length;

  return results.map(item => {
    const score = item.sentiment_score || 50;
    const chgPct = item._changePct || 0;
    if (typeof chgPct === 'number' && chgPct < -3) { console.log(`[PT] enforceScore: skipping boost for ${item.ticker} (down day ${chgPct}%)`); return item; }
    if (bullishCount >= 2 && bearishCount === 0 && score < 65) { console.warn(`[PT-SCORE] ${item.ticker}: Tier1 boost ${score} → 72`); return { ...item, sentiment: 'positive', sentiment_score: 72 }; }
    return item;
  });
}

// ── analyzeChunk ─────────────────────────────────────────────────────────────
async function analyzeChunk(batch, today) {
  // Enforce single-ticker mode — split multi-ticker into sequential single runs
  if (batch.length > 1) {
    console.log(`[PT] Multi-ticker batch: running sequentially for isolation`);
    const allResults = [];
    for (const sym of batch) {
      const r = await analyzeChunk([sym], today);
      allResults.push(...r);
    }
    return allResults;
  }
  console.log(`[PT] analyzeChunk START: ${batch[0]}`);
  let rawText = '', pplxData = {}, stockData = {};

  stockData = await fetchBatchStockData(batch);
  batch.forEach(sym => { _fetchTimestamps[sym] = Date.now(); });
  batch.forEach(sym => {
    const d = stockData[sym];
    if (d) console.log(`[PT] Market OK: ${sym} $${d.price} ${d.change_percent}% [${d.source}]`);
    else   console.warn(`[PT] Market MISS: ${sym}`);
  });
  const stockContext = formatStockContext(stockData);

  if (apiKey && pplxKey) {
    // Per-ticker isolation: call Perplexity once per ticker, never batch
    for (const sym of batch) {
      try {
        const raw = await fetchPerplexityContext([sym]); // single ticker only
        const parsed = parsePerplexityContext(raw);
        // Merge into pplxData — only under the correct ticker key
        if (parsed[sym]) {
          pplxData[sym] = parsed[sym];
          console.log(`[PT] Perplexity OK for ${sym}: ${parsed[sym].analystActions?.length || 0} analyst actions`);
        } else if (parsed['__raw__']) {
          // Fallback: tag raw context under the correct ticker
          pplxData[sym] = { ...parsed['__raw__'], _ticker: sym };
          console.log(`[PT] Perplexity raw fallback for ${sym}`);
        }
      } catch(e) { console.warn(`[PT] Perplexity failed for ${sym}:`, e.message); }
    }
    console.log(`[PT] Perplexity parsed tickers: ${Object.keys(pplxData).join(',') || 'none'}`);

    // Debug: console only — never expose to UI
    console.log('[PT] stockContext length:', stockContext.length);
    console.log('[PT] pplxData keys:', Object.keys(pplxData).join(','));

    rawText = await fetchAnthropicAnalysis(batch, today, stockContext + '\n%%NEWS_CONTEXT_START%%\n' + JSON.stringify(pplxData));
  } else if (apiKey) {
    rawText = await fetchAnthropicAnalysis(batch, today, stockContext);
  } else if (pplxKey) {
    rawText = await fetchPerplexityAnalysis(batch, today, stockContext);
  }

  console.log('[PT] Claude raw response length:', rawText.length);
  const parsed = parseJSON(rawText);
  const raw = parsed.results || [];

  const orchestrated = orchestrate(raw, pplxData, stockData);

  window._lastRunState = { stockData, pplxData, runId: Date.now(), timestamp: new Date().toISOString() };

  const resultsWithPct = orchestrated.map(item => {
    const mkt = stockData[item.ticker];
    return mkt ? { ...item, _changePct: mkt.change_percent } : item;
  });
  return enforceScoreConsistency(resultsWithPct, pplxKey ? JSON.stringify(pplxData) : '');
}

// ── renderResults ────────────────────────────────────────────────────────────
function renderResults(allResults, dateStr) {

  const dateEl = document.getElementById('resultsDate');

  if (section) section.style.display = 'block';
  const es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';

  // Regime bar
  const rb = document.getElementById('regimeBar');
  if (rb) {
    const avg = allResults.length ? Math.round(allResults.reduce((s,r)=>s+(r.sentiment_score||50),0)/allResults.length) : 50;
    const [rLbl,rCls] = avg>=65?['RISK-ON','on']:avg<=40?['RISK-OFF','off']:['MIXED','mix'];
    rb.innerHTML = `<div class="live-dot"></div>
      <span class="rpill ${rCls}">${rLbl}</span>
      <span class="rpill inf">AVG ${avg}/100</span>
      <span class="rpill inf">${allResults.length} TICKERS</span>`;
  }

  grid.innerHTML = allResults.map(item => {
    const score = item.sentiment_score || 50;
    const sent  = item.sentiment==='positive'?'positive':item.sentiment==='negative'?'negative':'neutral';
    const chg   = typeof item._verifiedChangePct==='number' ? item._verifiedChangePct : null;
    const price = item._verifiedPrice ? `$${item._verifiedPrice.toFixed(2)}` : '';
    const sum   = item.summary || '';
    const sumLower = sum.toLowerCase();

    // Parse sections
    const getS = tag => {
      const m = sum.match(new RegExp(tag+':?\\s*(.+?)(?=KEY EVENT:|ROOT CAUSE:|PRICE CONTEXT:|BULL VS BEAR:|ACTIONABLE TAKE:|Rating:|$)','si'));
      return m ? m[1].trim().replace(/\n/g,' ').replace(/\s+/g,' ') : '';
    };
    const keyEvent   = getS('KEY EVENT');
    const rootCause  = getS('ROOT CAUSE');
    const priceCtx   = getS('PRICE CONTEXT');
    const bullBear   = getS('BULL VS BEAR');
    const actionable = getS('ACTIONABLE TAKE');
    const rM = sum.match(/Rating:\s*(Buy|Neutral|Sell)/i);
    const pM = sum.match(/PT:\s*\$?([\d,.]+|consensus unavailable)/i);
    const rating    = rM ? rM[1] : 'Neutral';
    const pt        = pM ? pM[1] : 'N/A';
    const ratingCls = rating.toLowerCase()==='buy'?'buy':rating.toLowerCase()==='sell'?'sell':'hold';

    // Trend phase
    let phase='RANGE', phaseCls='base';
    if(sumLower.includes('accumulation')){phase='ACCUMULATION';phaseCls='accumulation'}
    else if(sumLower.includes('continuation')){phase='CONTINUATION';phaseCls='continuation'}
    else if(sumLower.includes('base formation')||sumLower.includes('basing')){phase='BASE';phaseCls='base'}
    else if(sumLower.includes('distribution')){phase='DISTRIBUTION';phaseCls='distribution'}
    else if(sumLower.includes('correction')||sumLower.includes('pullback')||sumLower.includes('profit-taking')){phase='CORRECTION';phaseCls='correction'}
    else if(sumLower.includes('extended')||sumLower.includes('overextended')){phase='EXTENDED';phaseCls='extended'}
    else if(chg!==null&&chg<-3){phase='CORRECTION';phaseCls='correction'}
    else if(chg!==null&&chg>3){phase='CONTINUATION';phaseCls='continuation'}

    // Setup grade
    const hasCrit = (item.alerts||[]).some(a=>a.type==='critical');
    let sg='C', sc='c';
    if(score>=78&&!hasCrit){sg='A+';sc='ap'}
    else if(score>=68&&!hasCrit){sg='A';sc='a'}
    else if(score>=55){sg='B';sc='b'}
    else if(score>=42){sg='C';sc='c'}

    // Technical checklist
    const chks = [
      ['50DMA',  chg!==null?(chg>-8?'pass':'fail'):  'na', chg!==null?(chg>-8?'YES':'NO'):'—'],
      ['150DMA', score>=55?'pass':score>=42?'warn':'fail', score>=55?'YES':score>=42?'WCH':'NO'],

// ── runAnalysis ───────────────────────────────────────────────────────────────
let _analysisRunning = false;
async function runAnalysis() {
  if (_analysisRunning) { console.warn('[PT] runAnalysis: already running, ignoring duplicate call'); return; }
  _analysisRunning = true;
  if (!apiKey && !pplxKey) { _analysisRunning = false; showError('נא להכניס לפחות מפתח API אחד (Anthropic או Perplexity)'); return; }
  if (tickers.length === 0) { _analysisRunning = false; showError('נא להוסיף לפחות טיקר אחד'); return; }

  // HARD STATE RESET
  results = [];
  localStorage.removeItem('pt_results');
  localStorage.removeItem('pt_date');
  window._lastPplxRaw = null;
  window._lastStockData = null;
  if (window._fetchTimestamps) Object.keys(window._fetchTimestamps).forEach(k => delete window._fetchTimestamps[k]);
  document.querySelectorAll('[class*="deepdive-result"]').forEach(el => { el.style.display = 'none'; const txt = el.querySelector('[id^="dd-text-"]'); if (txt) txt.textContent = ''; });
  document.querySelectorAll('[id^="dd-btn-"]').forEach(btn => { btn.textContent = 'Deep Dive — ניתוח מוסדי מעמיק'; btn.disabled = false; });
  const resultsGrid = document.getElementById('cardsGrid');
  if (resultsGrid) resultsGrid.innerHTML = '';
  console.log('[PT] State reset complete — UI cleared');

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'מנתח...';
  document.getElementById('errorBox').style.display = 'none';
  if (document.getElementById('emptyState')) document.getElementById('emptyState').style.display = 'none';

  const today = new Date().toLocaleDateString('he-IL');
  const BATCH_SIZE = 5;
  const allResults = [];

  try {
    setProgress(5, 'מאתחל...');
    for (let i = 0; i < tickers.length; i += BATCH_SIZE) {
      const batch = tickers.slice(i, i + BATCH_SIZE);
      const pct = Math.round(10 + (i / tickers.length) * 80);
      setProgress(pct, `מנתח ${batch.join(', ')}...`);
      const batchResults = await analyzeChunk(batch, today);
      allResults.push(...batchResults);
      results = [...allResults];
      const dateStr = new Date().toLocaleString('he-IL');
      renderResults(allResults, dateStr);
    }

    setProgress(100, 'הניתוח הושלם!');
    const dateStr = new Date().toLocaleString('he-IL');

    const validResults = allResults.filter(r => {
      // Strict schema: must have ticker, numeric score, non-empty summary
      const ok = r &&
        typeof r.ticker === 'string' && r.ticker.length > 0 &&
        typeof r.sentiment_score === 'number' && r.sentiment_score >= 0 && r.sentiment_score <= 100 &&
        typeof r.summary === 'string' && r.summary.length > 50 &&
        ['positive','negative','neutral'].includes(r.sentiment) &&
        // Summary must not contain raw pipeline state
        !r.summary.includes('=== PERPLEXITY') &&
        !r.summary.includes('%%NEWS_CONTEXT') &&
        !r.summary.includes('__raw__');
      if (!ok) console.warn('[PT] REJECTED malformed result:', JSON.stringify(r).slice(0,120));
      return ok;
    });

    const seen = new Set();
    const dedupedResults = [...validResults].reverse().filter(r => {
      if (seen.has(r.ticker)) { console.warn('[PT] DEDUP: dropped stale result for', r.ticker); return false; }
      seen.add(r.ticker); return true;
    }).reverse();

    const runId = Date.now();
    const runTimestamp = new Date().toISOString();
    dedupedResults.forEach(r => { r._runId = runId; r._timestamp = runTimestamp; });

    console.log(`[PT] Saving ${dedupedResults.length} validated results (${allResults.length - dedupedResults.length} dropped)`);
    localStorage.setItem('pt_results', JSON.stringify(dedupedResults));
    localStorage.setItem('pt_date', dateStr);
    results = dedupedResults;
    try {
      renderResults(dedupedResults, dateStr);
    } catch(renderErr) {
      console.error('[PT] renderResults failed:', renderErr.message);
      showError('שגיאה בהצגת התוצאות: ' + renderErr.message);
    }

  } catch (err) {
    hideProgress();
    showError(err.message || 'שגיאה לא ידועה');
    btn.disabled = false;
    btn.textContent = 'הפעל ניתוח יומי';
    document.getElementById('resultsSection').style.display = results.length ? 'block' : 'none';
  } finally {
    _analysisRunning = false;
    btn.disabled = false;
    btn.textContent = 'הפעל ניתוח יומי';
    hideProgress();
  }
}

// ── init ──────────────────────────────────────────────────────────────────────
function init() {
  if (apiKey) { document.getElementById('apiKey').value = apiKey; document.getElementById('keyStatus').textContent = '✓ שמור'; document.getElementById('keyStatus').style.color = 'var(--green)'; }
  else { document.getElementById('keyStatus').textContent = '⚠ נדרש — הכנס key ולחץ שמור'; document.getElementById('keyStatus').style.color = 'orange'; }
  if (pplxKey) { document.getElementById('pplxKey').value = pplxKey; document.getElementById('pplxKeyStatus').textContent = '✓ שמור'; document.getElementById('pplxKeyStatus').style.color = 'var(--green)'; }
  if (avKey) { document.getElementById('avKey').value = avKey; document.getElementById('avKeyStatus').textContent = '✓ שמור'; document.getElementById('avKeyStatus').style.color = 'var(--green)'; }
  renderChips();
  if (results.length) { const dateStr = localStorage.getItem('pt_date') || ''; renderResults(results, dateStr); }
}

init();
// ─────────────────────────────────────────────────────────────────────────────



</script>
